<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeR Seminovos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
        <div>
          <div class="sb-nome">MeR</div>
          <div class="sb-sub">Seminovos</div>
        </div>
      </div>
      <button id="btnToggleSidebar" class="sb-toggle">&#8249;</button>
    </div>

    <nav class="sb-nav">
      <button class="nb active" data-view="dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="nb" data-view="veiculos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
        </svg>
        <span>Veiculos</span>
      </button>
      <button class="nb" data-view="vencimentos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <span>Vencimentos</span>
      </button>
      <button class="nb" data-view="documentos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
        </svg>
        <span>Documentos</span>
      </button>
    </nav>

    <div class="sb-dados">
      <div class="sb-dados-label">Dados</div>
      <button class="db-btn" id="btnExportar">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Exportar .XLS</span>
      </button>
      <button class="db-btn" id="btnImportar">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Importar .XLS</span>
      </button>
      <input type="file" id="fileImport" accept=".xls,.xlsx,.json" style="display:none"/>
    </div>

    <div class="sb-footer">
      <span>MeR Seminovos</span>
      <small>Painel de Documentacao</small>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">

    <header id="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="topbar-right">
        <div class="search-box">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Buscar placa, modelo, proprietario..."/>
        </div>
        <button class="btn-primario" id="btnNovoVeiculo">+ Novo Veiculo</button>
      </div>
    </header>

    <!-- VIEW DASHBOARD -->
    <section class="view active" id="view-dashboard">
      <div id="statsGrid" class="stats-grid"></div>
      <div class="dash-row">
        <div class="card">
          <div class="card-head">
            <span>Vencimentos Proximos</span>
            <span class="badge-accent" id="cntAlertas">0</span>
          </div>
          <div id="listaAlertas"></div>
        </div>
        <div class="card">
          <div class="card-head"><span>Ultimos Cadastros</span></div>
          <div id="listaUltimos"></div>
        </div>
      </div>
    </section>

    <!-- VIEW VEICULOS -->
    <section class="view" id="view-veiculos">
      <div class="toolbar">
        <div class="filtros">
          <select id="filtroTipo">
            <option value="">Todos os tipos</option>
            <option>Carro</option><option>Moto</option>
            <option>Caminhao</option><option>Van</option><option>Onibus</option>
          </select>
          <select id="filtroStatus">
            <option value="">Todos os status</option>
            <option>Regular</option><option>Pendente</option><option>Vencido</option>
          </select>
        </div>
        <div class="view-btns">
          <button class="vb active" id="btnGrade" title="Grade">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="vb" id="btnLista" title="Lista">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="gradeVeiculos" class="grade"></div>
    </section>

    <!-- VIEW VENCIMENTOS -->
    <section class="view" id="view-vencimentos">
      <div id="listaVencimentos"></div>
    </section>

    <!-- VIEW DOCUMENTOS -->
    <section class="view" id="view-documentos">
      <div id="listaDocumentos"></div>
    </section>

  </div>

  <!-- MODAL VEICULO -->
  <div class="overlay" id="overlayVeiculo">
    <div class="modal" id="modalVeiculo">
      <div class="modal-head">
        <h2 id="tituloModal">Novo Veiculo</h2>
        <button class="btn-fechar" id="btnFecharModal">&#10005;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="fId"/>

        <div class="fsec">
          <div class="fsec-title">Identificacao</div>
          <div class="fgrid2">
            <div class="fg"><label>Apelido / Nome</label><input type="text" id="fApelido" placeholder="Ex: Gol Prata 2020"/></div>
            <div class="fg"><label>Placa</label><input type="text" id="fPlaca" placeholder="ABC-1234"/></div>
            <div class="fg"><label>Tipo</label>
              <select id="fTipo">
                <option value="">Selecione</option>
                <option>Carro</option><option>Moto</option>
                <option>Caminhao</option><option>Van</option><option>Onibus</option>
              </select>
            </div>
            <div class="fg"><label>Status</label>
              <select id="fStatus">
                <option>Regular</option><option>Pendente</option><option>Vencido</option>
              </select>
            </div>
            <div class="fg"><label>Marca</label><input type="text" id="fMarca" placeholder="Volkswagen"/></div>
            <div class="fg"><label>Modelo</label><input type="text" id="fModelo" placeholder="Gol"/></div>
            <div class="fg"><label>Ano</label><input type="number" id="fAno" placeholder="2020"/></div>
            <div class="fg"><label>Cor</label><input type="text" id="fCor" placeholder="Prata"/></div>
            <div class="fg"><label>RENAVAM</label><input type="text" id="fRenavam" placeholder="00000000000"/></div>
            <div class="fg"><label>Chassi</label><input type="text" id="fChassi" placeholder="9BWZZZ377VT004251"/></div>
          </div>
          <div class="fg"><label>Proprietario</label><input type="text" id="fProprietario" placeholder="Nome completo"/></div>
          <div class="fg" style="margin-top:12px"><label>Observacoes</label><textarea id="fObs" rows="3" placeholder="Anotacoes..."></textarea></div>
        </div>

        <div class="fsec">
          <div class="fsec-title">Datas Importantes</div>
          <div class="fgrid2">
            <div class="fg"><label>IPVA</label><input type="date" id="fIpva"/></div>
            <div class="fg"><label>Licenciamento</label><input type="date" id="fLicenciamento"/></div>
            <div class="fg"><label>Seguro</label><input type="date" id="fSeguro"/></div>
            <div class="fg"><label>CNH</label><input type="date" id="fCnh"/></div>
            <div class="fg"><label>Proxima Revisao</label><input type="date" id="fRevisao"/></div>
            <div class="fg"><label>Vistoria</label><input type="date" id="fVistoria"/></div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-secundario" id="btnCancelarModal">Cancelar</button>
          <button class="btn-primario" id="btnSalvarVeiculo">Salvar Veiculo</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DETALHE -->
  <div class="overlay" id="overlayDetalhe">
    <div class="modal modal-lg" id="modalDetalhe">
      <div class="modal-head">
        <h2 id="tituloDetalhe">Detalhe</h2>
        <button class="btn-fechar" id="btnFecharDetalhe">&#10005;</button>
      </div>
      <div class="modal-body" id="corpoDetalhe"></div>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
