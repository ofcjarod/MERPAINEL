<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Ultra Otimizada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <main class="container">
        <header class="header">
            <h1>Galeria de Alta Performance</h1>
            <p>Renderização otimizada via hardware e JS assíncrono.</p>
        </header>

        <section class="grid" id="grid-produtos">
            <article class="card">
                <img src="https://picsum.photos/400/300" 
                     alt="Exemplo Otimizado" 
                     class="card__img" 
                     loading="lazy" 
                     width="400" 
                     height="300">
                <div class="card__content">
                    <h2 class="card__title">Item Otimizado</h2>
                    <p class="card__text">Este card usa transições aceleradas por GPU.</p>
                    <button class="btn" data-action="click-efeito">Interagir</button>
                </div>
            </article>
        </section>
    </main>

</body>
</html>
