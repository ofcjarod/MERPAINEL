<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeR Seminovos CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080808;
      --bg2:#111;
      --bg3:#181818;
      --bg4:#222;
      --brd:#2a2a2a;
      --txt:#f0f0f0;
      --sub:#9a9a9a;
      --mut:#5d5d5d;
      --ac:#ffb300;
      --ac2:#ff7a18;
      --ok:#22c55e;
      --warn:#f59e0b;
      --err:#ef4444;
      --r:12px;
      --sw:240px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--txt);
      display:flex;
    }

    button,input,select,textarea{
      font:inherit;
      outline:none;
    }

    button{
      cursor:pointer;
      border:none;
      background:none;
    }

    a{color:var(--ac);text-decoration:none}

    /* SIDEBAR */
    #sidebar{
      width:var(--sw);
      flex-shrink:0;
      background:var(--bg2);
      border-right:1px solid var(--brd);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:width .22s ease;
    }
    #sidebar.collapsed{width:60px}
    #sidebar.collapsed .hid{
      width:0;
      opacity:0;
      overflow:hidden;
      pointer-events:none;
    }

    .sb-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px 11px;
      border-bottom:1px solid var(--brd);
      gap:8px;
      flex-shrink:0;
    }
    .sb-logo{
      display:flex;
      align-items:center;
      gap:9px;
      color:var(--ac);
      min-width:0;
    }
    .sb-brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      white-space:nowrap;
      transition:.2s;
    }
    .bn{
      font-family:'Montserrat',sans-serif;
      font-size:16px;
      font-weight:900;
      color:var(--ac);
    }
    .bs{
      font-size:9px;
      font-weight:800;
      color:var(--ac2);
      text-transform:uppercase;
      letter-spacing:1.5px;
    }
    #btnToggle{
      width:26px;
      height:26px;
      border-radius:7px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:.2s;
    }
    #btnToggle:hover{border-color:var(--ac);color:var(--ac)}

    .sb-nav{
      flex:1;
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:3px;
      overflow-y:auto;
    }

    .nb{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:11px 10px;
      border-radius:10px;
      color:var(--mut);
      text-align:left;
      transition:.2s;
      white-space:nowrap;
    }
    .nb:hover{background:var(--bg3);color:var(--txt)}
    .nb.on{background:rgba(255,179,0,.1);color:var(--ac)}

    .sb-ac{
      border-top:1px solid var(--brd);
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .lbl{
      font-size:10px;
      color:var(--mut);
      text-transform:uppercase;
      letter-spacing:1px;
      padding:3px 5px;
      white-space:nowrap;
      transition:.2s;
    }
    .ab{
      display:flex;
      align-items:center;
      gap:9px;
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      white-space:nowrap;
    }
    .ab:hover{border-color:var(--ac);color:var(--ac)}
    .sb-ft{
      border-top:1px solid var(--brd);
      padding:13px 11px;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .sb-ft span{
      font-family:'Montserrat',sans-serif;
      font-size:12px;
      font-weight:900;
      color:var(--ac);
      white-space:nowrap;
      transition:.2s;
    }
    .sb-ft small{
      font-size:10px;
      color:var(--mut);
      white-space:nowrap;
      transition:.2s;
    }

    /* MAIN */
    #main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      overflow:hidden;
    }

    #topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:15px 20px;
      border-bottom:1px solid var(--brd);
      background:#0d0d0d;
      flex-shrink:0;
    }

    #pgTitle{
      font-family:'Montserrat',sans-serif;
      font-size:25px;
      font-weight:900;
      letter-spacing:-.4px;
    }

    .tb-r{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .sbox{
      display:flex;
      align-items:center;
      gap:7px;
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:11px;
    }
    .sbox input{
      background:transparent;
      border:none;
      color:var(--txt);
      width:260px;
    }
    .sbox input::placeholder{color:var(--mut)}

    /* BUTTONS */
    .bac{
      padding:10px 16px;
      border-radius:11px;
      font-weight:700;
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      color:#111;
      transition:.2s;
    }
    .bac:hover{filter:brightness(1.08)}

    .bgh{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--txt);
      transition:.2s;
    }
    .bgh:hover{border-color:var(--ac);color:var(--ac)}

    .bdn{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.25);
      color:var(--err);
      transition:.2s;
    }
    .bdn:hover{background:rgba(239,68,68,.15)}

    .bsm{
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      flex-shrink:0;
    }
    .bsm:hover{border-color:var(--ac);color:var(--ac)}

    .bx{
      color:var(--sub);
      font-size:20px;
      transition:.2s;
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .bx:hover{background:var(--bg3);color:var(--txt)}

    .tv{
      width:34px;
      height:34px;
      border-radius:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
    }
    .tv.on{background:rgba(255,179,0,.1);border-color:rgba(255,179,0,.3);color:var(--ac)}

    /* VIEWS */
    .view{
      display:none;
      flex:1;
      overflow-y:auto;
      padding:18px 20px 40px;
    }
    .view.on{display:block}

    /* STATS */
    .stats-g{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:11px;
      margin-bottom:18px;
    }
    .sc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-top:3px solid transparent;
      border-radius:var(--r);
      padding:15px;
    }
    .sc-v{
      font-size:30px;
      font-weight:900;
      line-height:1;
      margin-bottom:5px;
    }
    .sc-l{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.7px;
      font-weight:700;
    }

    /* DASH */
    .dash-c{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:13px;
    }
    .card{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      overflow:hidden;
    }
    .card-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
    }
    .card-h span{
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:var(--sub);
    }
    .bdg{
      background:rgba(255,179,0,.1);
      color:var(--ac);
      border-radius:20px;
      padding:2px 10px;
      font-size:12px;
      font-weight:800;
    }

    .ai{
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .ai:last-child{border-bottom:none}
    .ai:hover{background:var(--bg3)}
    .ai-d{
      width:9px;height:9px;border-radius:50%;flex-shrink:0;
    }
    .ai-ico{
      width:32px;height:32px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .ai-inf{
      flex:1;min-width:0;
    }
    .ai-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ai-inf small{
      color:var(--sub);
      font-size:11px;
    }
    .ai-tg{
      padding:3px 9px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }

    /* TOOLBAR */
    .tlb{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:15px;
    }
    .flt{
      display:flex;
      gap:8px;
    }
    .flt select{
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .tvg{display:flex;gap:5px}

    /* GRADE */
    .grade{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(275px,1fr));
      gap:13px;
    }
    .grade.ls{grid-template-columns:1fr}
    .vc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      padding:15px;
      cursor:pointer;
      transition:.18s;
    }
    .vc:hover{
      border-color:rgba(255,179,0,.3);
      transform:translateY(-1px);
      box-shadow:0 8px 22px rgba(0,0,0,.28);
    }
    .vc-tp{
      display:flex;
      align-items:flex-start;
      gap:11px;
      margin-bottom:11px;
    }
    .vc-ico{
      width:40px;height:40px;border-radius:10px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .vc-nm{font-size:14px;font-weight:700;line-height:1.2}
    .vc-pl{font-size:12px;color:var(--sub);margin-top:3px;letter-spacing:.4px}
    .vc-mt{
      display:flex;
      flex-direction:column;
      gap:4px;
      font-size:12px;
      color:var(--sub);
      margin-bottom:11px;
    }
    .vc-ft{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .vc-ac{display:flex;gap:5px}

    /* STATUS */
    .st{
      padding:3px 10px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
    }
    .stR{background:rgba(34,197,94,.1);color:#22c55e}
    .stP{background:rgba(245,158,11,.1);color:#f59e0b}
    .stV{background:rgba(239,68,68,.1);color:#ef4444}

    /* VENCIMENTOS */
    .vr{
      display:grid;
      grid-template-columns:1fr 130px 130px 175px;
      align-items:center;
      gap:14px;
      padding:13px 16px;
      background:var(--bg2);
      border:1px solid var(--brd);
      border-left:3px solid transparent;
      border-radius:var(--r);
      margin-bottom:8px;
      cursor:pointer;
      transition:.18s;
    }
    .vr:hover{background:var(--bg3)}
    .vr-nm{font-size:14px;font-weight:700}
    .vr-sb{font-size:12px;color:var(--sub);margin-top:2px}
    .vr-tp{font-size:13px;font-weight:600;color:var(--sub)}
    .vr-dt{font-size:13px;font-weight:600}
    .vr-ds{font-size:13px;font-weight:800;text-align:right}

    /* DOCS VIEW */
    .db{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      margin-bottom:13px;
      overflow:hidden;
    }
    .db-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .db-h:hover{background:var(--bg3)}
    .dr{
      display:flex;
      align-items:center;
      gap:11px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      transition:.15s;
    }
    .dr:last-child{border-bottom:none}
    .dr:hover{background:var(--bg3)}
    .dr-ico{
      width:34px;height:34px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .dr-inf{
      flex:1;min-width:0;
    }
    .dr-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dr-inf small{
      color:var(--sub);
      font-size:11px;
    }

    /* MODAL */
    .ov{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(5px);
      z-index:200;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s;
    }
    .ov.on{opacity:1;pointer-events:all}
    .modal{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:18px;
      width:92%;
      max-width:680px;
      max-height:90vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
      overflow:hidden;
    }
    .modal-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--brd);
    }
    .modal-h h2{
      font-family:'Montserrat',sans-serif;
      font-size:18px;
      font-weight:900;
      color:var(--ac);
    }
    .modal-b{
      padding:16px;
      overflow:auto;
    }
    .fgrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .fg label{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
      font-weight:700;
    }
    .fg input,.fg select,.fg textarea{
      padding:10px 11px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .fg textarea{resize:vertical;min-height:88px}
    .fsec{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:14px;
      padding:13px;
      margin-bottom:12px;
    }
    .fsec h3{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:var(--sub);
      margin-bottom:10px;
    }
    .modal-f{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      padding:14px 16px;
      border-top:1px solid var(--brd);
      background:var(--bg2);
    }

    /* DETAIL */
    .det-g{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .det-c{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:14px;
      padding:13px;
    }
    .det-c h3{
      font-size:12px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:10px;
    }
    .det-i{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 12px;
    }
    .det-i div{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:10px;
      padding:9px;
    }
    .det-i label{
      display:block;
      font-size:10px;
      color:var(--sub);
      text-transform:uppercase;
      margin-bottom:3px;
    }
    .det-i span{font-size:13px;font-weight:600}
    .doc-add{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto;
      gap:8px;
      align-items:end;
    }
    .doc-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-top:1px solid var(--brd);
    }
    .doc-item:first-child{border-top:none}
    .doc-item .x{
      margin-left:auto;
    }

    /* EMPTY */
    .empty{
      background:var(--bg2);
      border:1px dashed var(--brd);
      border-radius:14px;
      padding:28px;
      text-align:center;
      color:var(--sub);
    }
    .empty h3{
      color:var(--txt);
      margin-top:8px;
      margin-bottom:6px;
    }

    /* TOAST */
    #toasts{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:500;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .toast{
      background:rgba(17,17,17,.96);
      border:1px solid var(--brd);
      border-left:3px solid var(--ac);
      padding:10px 12px;
      border-radius:10px;
      min-width:240px;
      box-shadow:0 14px 30px rgba(0,0,0,.3);
      color:var(--txt);
      font-size:13px;
    }
    .toast.err{border-left-color:var(--err)}
    .toast.ok{border-left-color:var(--ok)}
    .toast.warn{border-left-color:var(--warn)}

    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    @media (max-width: 1200px){
      .stats-g{grid-template-columns:repeat(2,1fr)}
      .dash-c{grid-template-columns:1fr}
      .fgrid,.det-g,.doc-add{grid-template-columns:1fr}
      .vr{grid-template-columns:1fr 120px}
      .vr-dt,.vr-ds{display:none}
    }
  </style>
</head>
<body>
  <aside id="sidebar">
    <div class="sb-h">
      <div class="sb-logo">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
        <div class="sb-brand hid">
          <span class="bn">MeR</span>
          <span class="bs">Seminovos</span>
        </div>
      </div>
      <button id="btnToggle">‹</button>
    </div>

    <nav class="sb-nav">
      <button class="nb on" data-view="dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span class="hid">Dashboard</span>
      </button>

      <button class="nb" data-view="veiculos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
        </svg>
        <span class="hid">Veiculos</span>
      </button>

      <button class="nb" data-view="vencimentos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <span class="hid">Vencimentos</span>
      </button>

  <div id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
  (() => {
    'use strict';

    const KEY = 'mer_seminovos_db_v1';

    const $ = s => document.querySelector(s);
    const $$ = s => [...document.querySelectorAll(s)];
    const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));
    const esc = s => String(s ?? '')
      .replaceAll('&','&')
      .replaceAll('<','<')
      .replaceAll('>','>')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');

    const norm = s => String(s ?? '')
      .toLowerCase()
      .trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    let db = [];
    let view = 'dashboard';
    let search = '';
    let listMode = false;
    let editId = null;
    let detailId = null;

    const dateFields = [
      {k:'ipva',l:'IPVA'},
      {k:'licenciamento',l:'Licenciamento'},
      {k:'seguro',l:'Seguro'},
      {k:'cnh',l:'CNH'},
      {k:'revisao',l:'Revisao'},
      {k:'vistoria',l:'Vistoria'}
    ];

    function saveDB(){ localStorage.setItem(KEY, JSON.stringify(db)); }
    function loadDB(){
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
      catch { return []; }
    }

    function toast(msg, type='ok'){
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      $('#toasts').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function fmtDate(d){
      if (!d) return '—';
      const x = new Date(d);
      return isNaN(x) ? '—' : x.toLocaleDateString('pt-BR');
    }

    function daysLeft(d){
      if (!d) return null;
      const a = new Date();
      a.setHours(0,0,0,0);
      const b = new Date(d + 'T00:00:00');
      return Math.ceil((b - a) / 86400000);
    }

    function dayColor(n){ return n < 0 ? '#ef4444' : n <= 15 ? '#f59e0b' : '#22c55e'; }
    function dayText(n){ return n < 0 ? `Vencido ha ${Math.abs(n)}d` : n === 0 ? 'Vence hoje' : `${n}d restantes`; }
    function statusClass(s){ return s === 'Pendente' ? 'stP' : s === 'Vencido' ? 'stV' : 'stR'; }

    function carIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      </svg>`;
    }
    function editIcon(){
      return `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>`;
    }
    function trashIcon(){
      return `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>`;
    }
    function docIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>`;
    }
    function calIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>`;
    }

    function mapRow(row){
      const pick = aliases => {
        const keys = Object.keys(row || {});
        for (const a of aliases){
          const f = keys.find(k => norm(k) === norm(a));
          if (f !== undefined) return String(row[f] ?? '').trim();
        }
        return '';
      };

      const parseDate = v => {
        if (!v) return '';
        if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
        const s = String(v).trim();
        const br = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (br) return `${br[3]}-${br[2]}-${br[1]}`;
        const d = new Date(s);
        return isNaN(d) ? '' : d.toISOString().slice(0,10);
      };

      return {
        id: uid(),
        criadoEm: new Date().toISOString(),
        atualizadoEm: new Date().toISOString(),
        documentos: [],
        apelido: pick(['Apelido','Nome','Apelido / Nome']),
        placa: pick(['Placa']),
        tipo: pick(['Tipo']),
        status: pick(['Status']) || 'Regular',
        marca: pick(['Marca']),
        modelo: pick(['Modelo']),
        ano: pick(['Ano']),
        cor: pick(['Cor']),
        renavam: pick(['RENAVAM','Renavam']),
        chassi: pick(['Chassi']),
        proprietario: pick(['Proprietario','Proprietário']),
        obs: pick(['Observacoes','Observações','Obs']),
        ipva: parseDate(pick(['IPVA','Venc. IPVA','Vencimento IPVA'])),
        licenciamento: parseDate(pick(['Licenciamento','Venc. Licenciamento'])),
        seguro: parseDate(pick(['Seguro','Venc. Seguro'])),
        cnh: parseDate(pick(['CNH','Venc. CNH'])),
        revisao: parseDate(pick(['Revisao','Revisão','Proxima Revisao','Próxima Revisão'])),
        vistoria: parseDate(pick(['Vistoria']))
      };
    }

    function normalizeVehicle(v){
      return {
        id: v.id || uid(),
        criadoEm: v.criadoEm || new Date().toISOString(),
        atualizadoEm: new Date().toISOString(),
        documentos: Array.isArray(v.documentos) ? v.documentos : [],
        apelido: v.apelido || '',
        placa: v.placa || '',
        tipo: v.tipo || '',
        status: v.status || 'Regular',
        marca: v.marca || '',
        modelo: v.modelo || '',
        ano: v.ano || '',
        cor: v.cor || '',
        renavam: v.renavam || '',
        chassi: v.chassi || '',
        proprietario: v.proprietario || '',
        obs: v.obs || '',
        ipva: v.ipva || '',
        licenciamento: v.licenciamento || '',
        seguro: v.seguro || '',
        cnh: v.cnh || '',
        revisao: v.revisao || '',
        vistoria: v.vistoria || ''
      };
    }

    function renderView(v){
      view = v;
      $$('.view').forEach(el => el.classList.remove('on'));
      $(`#view-${v}`).classList.add('on');
      $$('.nb').forEach(b => b.classList.toggle('on', b.dataset.view === v));

      const titles = {dashboard:'Dashboard', veiculos:'Veiculos', vencimentos:'Vencimentos', documentos:'Documentos'};
      $('#pgTitle').textContent = titles[v] || v;

      if (v === 'dashboard') renderDashboard();
      if (v === 'veiculos') renderVeiculos();
      if (v === 'vencimentos') renderVencimentos();
      if (v === 'documentos') renderDocumentos();
    }

    function renderDashboard(){
      const stats = [
        {l:'Total', v:db.length, c:'#ffb300'},
        {l:'Regulares', v:db.filter(x => x.status === 'Regular').length, c:'#22c55e'},
        {l:'Pendentes', v:db.filter(x => x.status === 'Pendente').length, c:'#f59e0b'},
        {l:'Vencidos', v:db.filter(x => x.status === 'Vencido').length, c:'#ef4444'},
        {l:'Documentos', v:db.reduce((a,x) => a + (x.documentos || []).length, 0), c:'#ff7a18'}
      ];

      $('#statsGrid').innerHTML = stats.map((s,i) => `
        <div class="sc" style="animation-delay:${i * .04}s;border-top-color:${s.c}">
          <div class="sc-v" style="color:${s.c}">${s.v}</div>
          <div class="sc-l">${s.l}</div>
        </div>
      `).join('');

      const alerts = [];
      db.forEach(v => {
        dateFields.forEach(f => {
          const d = daysLeft(v[f.k]);
          if (d !== null && d <= 60) alerts.push({id:v.id, nome:v.apelido || v.placa || 'Sem nome', tipo:f.l, d, data:v[f.k]});
        });
      });
      alerts.sort((a,b) => a.d - b.d);
      $('#countAlertas').textContent = String(alerts.length);

      $('#alertasVencimento').innerHTML = alerts.length ? alerts.slice(0,7).map(a => {
        const c = dayColor(a.d);
        return `
          <div class="ai" data-open="${a.id}">
            <div class="ai-d" style="background:${c}"></div>
            <div class="ai-inf">
              <strong>${esc(a.nome)}</strong>
              <small>${esc(a.tipo)} — ${fmtDate(a.data)}</small>
            </div>
            <span class="ai-tg" style="background:${c}22;color:${c}">${dayText(a.d)}</span>
          </div>
        `;
      }).join('') : `
        <div class="empty" style="margin:12px">
          <h3>Nenhum vencimento proximo</h3>
          <p>Sem datas nos proximos 60 dias.</p>
        </div>
      `;

      const sorted = db.slice().sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));
      $('#ultimosCadastros').innerHTML = sorted.length ? sorted.slice(0,6).map(v => {
        const sub = [v.marca, v.modelo, v.ano].filter(Boolean).join(' ') + (v.placa ? ` — ${v.placa}` : '');
        return `
          <div class="ai" data-open="${v.id}">
            <div class="ai-ico">${carIcon(15)}</div>
            <div class="ai-inf">
              <strong>${esc(v.apelido || 'Sem nome')}</strong>
              <small>${esc(sub || '—')}</small>
            </div>
            <span class="st ${statusClass(v.status)}">${esc(v.status || 'Regular')}</span>
          </div>
        `;
      }).join('') : `
        <div class="empty" style="margin:12px">
          <h3>Nenhum veiculo cadastrado</h3>
          <p>Use o botão “Novo Veiculo”.</p>
        </div>
      `;
    }

    function renderVeiculos(){
      const tipo = $('#filtroTipo').value;
      const status = $('#filtroStatus').value;

      const lista = db.filter(v => {
        const q = !search ||
          norm(v.apelido).includes(search) ||
          norm(v.placa).includes(search) ||
          norm(v.marca).includes(search) ||
          norm(v.modelo).includes(search) ||
          norm(v.proprietario).includes(search);
        return q && (!tipo || v.tipo === tipo) && (!status || v.status === status);
      });

      const el = $('#veiculosGrid');
      el.classList.toggle('ls', listMode);

      if (!lista.length){
        el.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <h3>Nenhum veiculo encontrado</h3>
            <p>Clique em "+ Novo Veiculo" para cadastrar.</p>
          </div>
        `;
        return;
      }

      el.innerHTML = lista.map((v,i) => {
        const pv = nextDue(v);
        const meta = [];
        if (v.marca || v.modelo || v.ano) meta.push(`<span><strong>${esc(v.marca || '')}</strong> ${esc(v.modelo || '')} ${esc(v.ano || '')}</span>`);
        if (v.cor) meta.push(`<span>Cor: <strong>${esc(v.cor)}</strong></span>`);
        if (v.proprietario) meta.push(`<span>Prop: <strong>${esc(v.proprietario)}</strong></span>`);
        if (pv) meta.push(`<span style="color:${pv.c}">${esc(pv.l)}: ${esc(pv.t)}</span>`);

        return `
          <div class="vc" data-open="${v.id}" style="animation-delay:${i * .03}s">
            <div class="vc-tp">
              <div class="vc-ico">${carIcon(21)}</div>
              <div>
                <div class="vc-nm">${esc(v.apelido || 'Sem nome')}</div>
                <div class="vc-pl">${esc(v.placa || '---')}</div>
              </div>
            </div>
            <div class="vc-mt">${meta.join('')}</div>
            <div class="vc-ft">
              <span class="st ${statusClass(v.status)}">${esc(v.status || 'Regular')}</span>
              <div class="vc-ac">
                <button class="bsm" data-action="edit" data-id="${v.id}" title="Editar">${editIcon()}</button>
                <button class="bsm" data-action="del" data-id="${v.id}" title="Excluir">${trashIcon()}</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function nextDue(v){
      let best = null;
      dateFields.forEach(f => {
        if (!v[f.k]) return;
        const d = daysLeft(v[f.k]);
        if (d === null) return;
        if (!best || d < best.d) best = {l:f.l, d, c:dayColor(d), t:dayText(d)};
      });
      return best;
    }

    function renderVencimentos(){
      const rows = [];
      db.forEach(v => {
        dateFields.forEach(f => {
          if (!v[f.k]) return;
          const d = daysLeft(v[f.k]);
          if (d === null) return;
          rows.push({v, f, d, data:v[f.k]});
        });
      });

      rows.sort((a,b) => a.d - b.d);

      const el = $('#vencimentosWrap');
      if (!rows.length){
        el.innerHTML = `
          <div class="empty">
            ${calIcon(46)}
            <h3>Nenhuma data cadastrada</h3>
            <p>Adicione datas nos veiculos para acompanhar aqui.</p>
          </div>
        `;
        return;
      }

      el.innerHTML = rows.map((r,i) => {
        const c = dayColor(r.d);
        const txt = r.d < 0 ? `Vencido ha ${Math.abs(r.d)} dias` : r.d === 0 ? 'Vence hoje' : `${r.d} dias restantes`;
        return `
          <div class="vr" data-open="${r.v.id}" style="animation-delay:${i * .02}s;border-left-color:${c}">
            <div>
              <div class="vr-nm">${esc(r.v.apelido || 'Sem nome')}</div>
              <div class="vr-sb">${esc(r.v.placa || '')} ${esc(r.v.marca || '')} ${esc(r.v.modelo || '')}</div>
            </div>
            <div class="vr-tp">${esc(r.f.l)}</div>
            <div class="vr-dt">${fmtDate(r.data)}</div>
            <div class="vr-ds" style="color:${c}">${txt}</div>
          </div>
        `;
      }).join('');
    }

    function renderDocumentos(){
      const el = $('#documentosWrap');
      const withDocs = db.filter(v => (v.documentos || []).length > 0);

      if (!withDocs.length){
        el.innerHTML = `
          <div class="empty">
            ${docIcon(46)}
            <h3>Nenhum documento salvo</h3>
            <p>Abra um veículo e adicione documentos no detalhe.</p>
          </div>
        `;
        return;
      }

      el.innerHTML = withDocs.map(v => `
        <div class="db" data-open="${v.id}">
          <div class="db-h">
            <div style="display:flex;align-items:center;gap:9px">
              ${carIcon(15)}
              <strong>${esc(v.apelido || v.placa || 'Sem nome')}</strong>
            </div>
            <span class="bdg">${(v.documentos || []).length} doc${(v.documentos || []).length !== 1 ? 's' : ''}</span>
          </div>
          ${(v.documentos || []).map(d => `
            <div class="dr">
              <div class="dr-ico">${docIcon(15)}</div>
              <div class="dr-inf">
                <strong>${esc(d.nome)}</strong>
                <small>${esc(d.tipo)}${d.size ? ' — ' + fmtBytes(d.size) : ''}</small>
              </div>
              <a class="bgh" href="${d.url}" download="${esc(d.nome)}" target="_blank" style="font-size:12px;padding:6px 10px">Abrir</a>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

      editId = id;

      $('#modalTitle').textContent = id ? 'Editar Veiculo' : 'Novo Veiculo';

      $('#fVistoria').value = v?.vistoria || '';

      $('#modalVeiculo').classList.add('on');
      setTimeout(() => $('#fApelido').focus(), 50);
    }

    function closeModal(){
      $('#modalVeiculo').classList.remove('on');
      editId = null;
    }

    function saveVehicle(){
      const data = {
        id: $('#veiculoId').value || uid(),
        apelido: $('#fApelido').value.trim(),
        placa: $('#fPlaca').value.trim(),
        tipo: $('#fTipo').value.trim(),
        status: $('#fStatus').value.trim() || 'Regular',
        marca: $('#fMarca').value.trim(),
        modelo: $('#fModelo').value.trim(),
        ano: $('#fAno').value.trim(),
        cor: $('#fCor').value.trim(),
        renavam: $('#fRenavam').value.trim(),
        chassi: $('#fChassi').value.trim(),
        proprietario: $('#fProprietario').value.trim(),
        obs: $('#fObs').value.trim(),
        ipva: $('#fIpva').value,
        licenciamento: $('#fLicenciamento').value,
        seguro: $('#fSeguro').value,
        cnh: $('#fCnh').value,
        revisao: $('#fRevisao').value,
        vistoria: $('#fVistoria').value
      };

      if (!data.apelido || !data.placa || !data.tipo){
        toast('Preencha Apelido, Placa e Tipo', 'warn');
        return;
      }

      const idx = db.findIndex(x => x.id === data.id);
      if (idx >= 0){
        db[idx] = { ...db[idx], ...data, atualizadoEm: new Date().toISOString(), documentos: db[idx].documentos || [] };
      } else {
        db.unshift({ ...data, criadoEm: new Date().toISOString(), atualizadoEm: new Date().toISOString(), documentos: [] });
      }

      saveDB();
      closeModal();
      renderView(view);
      toast('Veiculo salvo com sucesso', 'ok');
    }

    function deleteVehicle(id){
      const v = db.find(x => x.id === id);
      if (!v) return;
      if (!confirm(`Excluir "${v.apelido || v.placa || 'veiculo'}"?`)) return;
      db = db.filter(x => x.id !== id);
      saveDB();
      if (detailId === id) closeDetail();
      renderView(view);
      toast('Veiculo excluido', 'ok');
    }
