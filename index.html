<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MeR Seminovos | CRM Profissional</title>
  <style>
    :root { --bg:#050505; --card:#111; --ac:#ffb300; --txt:#eee; --brd:#333; --err:#ef4444; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); display: flex; height: 100vh; margin: 0; }
    
    /* Layout */
    aside { width: 260px; background: #000; border-right: 1px solid var(--brd); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    main { flex: 1; padding: 40px; overflow: auto; }
    
    /* Logo */
    .logo-container { margin-bottom: 30px; text-align: center; }
    .logo-container img { width: 150px; height: auto; border-radius: 8px; }

    /* UI Components */
    .view { display: none; }
    .view.active { display: block; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--brd); }
    .btn { padding: 12px; cursor: pointer; background: #222; color: #fff; border: 1px solid var(--brd); border-radius: 6px; font-weight: bold; }
    .btn:hover { background: var(--ac); color: #000; }
    
    input { width: 100%; padding: 10px; margin: 5px 0 15px; background: #222; border: 1px solid var(--brd); color: white; border-radius: 4px; }
  </style>
</head>
<body>

<aside>
    <div class="logo-container">
        <img src="LOGOTIPO.png" alt="Logo MeR Seminovos">
    </div>
    <button class="btn" onclick="switchView('view-cadastro')">+ Cadastro</button>
    <button class="btn" onclick="switchView('view-estoque')">Estoque</button>
    <hr style="border:0; border-top:1px solid #333; margin: 10px 0;">
    <button class="btn" id="btnImportar">Importar XML/JSON</button>
    <button class="btn" id="btnExportar">Exportar Backup</button>
    <input type="file" id="inputImportar" hidden accept=".xml,.json">
</aside>

<main>
    <div id="view-cadastro" class="view active">
        <h1>Cadastrar Veículo</h1>
        <div class="card">
            <input type="text" id="cModelo" placeholder="Modelo">
            <input type="text" id="cPlaca" placeholder="Placa (Ex: ABC-1234)">
            <button class="btn" onclick="salvarVeiculo()">Salvar Veículo</button>
        </div>
    </div>
    <div id="view-estoque" class="view" style="display:none;">
        <h1>Estoques</h1>
        <div id="listaEstoque"></div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('mer_db') || '[]');

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'view-estoque') renderEstoque();
    }

    function salvarVeiculo(dados) {
        // Anti-Duplicidade: Procura placa
        const placa = (dados.placa || document.getElementById('cPlaca').value).toUpperCase().trim();
        const index = db.findIndex(v => v.placa.toUpperCase() === placa);
        
        const novo = {
            id: index > -1 ? db[index].id : Date.now(),
            modelo: dados.modelo || document.getElementById('cModelo').value,
            placa: placa
        };

        if(index > -1) db[index] = novo; // Unifica
        else db.push(novo); // Cria novo
        
        localStorage.setItem('mer_db', JSON.stringify(db));
        if(!dados.placa) { alert('Veículo salvo!'); location.reload(); }
    }

    function renderEstoque() {
        document.getElementById('listaEstoque').innerHTML = db.map(v => 
            `<div class="card"><strong>${v.modelo}</strong> | Placa: ${v.placa}</div>`
        ).join('');
    }

    // Exportação
    document.getElementById('btnExportar').onclick = () => {
        const a = document.createElement('a');
        a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(db));
        a.download = 'backup_crm.json'; a.click();
    };

    // Importação
    document.getElementById('btnImportar').onclick = () => document.getElementById('inputImportar').click();
    document.getElementById('inputImportar').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const file = e.target.files[0];
            if(file.name.endsWith('.xml')) {
                const xml = new DOMParser().parseFromString(evt.target.result, "text/xml");
                const itens = xml.getElementsByTagName("veiculo");
                for(let v of itens) {
                    salvarVeiculo({
                        modelo: v.getElementsByTagName("modelo")[0]?.textContent,
                        placa: v.getElementsByTagName("placa")[0]?.textContent
                    });
                }
            } else {
                db = JSON.parse(evt.target.result);
                localStorage.setItem('mer_db', JSON.stringify(db));
            }
            location.reload();
        };
        reader.readAsText(file);
    };
</script>
</body>
</html>
