<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeR Seminovos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080808;
      --bg2:#111;
      --bg3:#181818;
      --bg4:#222;
      --brd:#2a2a2a;
      --txt:#f0f0f0;
      --sub:#9a9a9a;
      --mut:#5d5d5d;
      --ac:#ffb300;
      --ac2:#ff7a18;
      --ok:#22c55e;
      --warn:#f59e0b;
      --err:#ef4444;
      --r:12px;
      --sw:240px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--txt);
      display:flex;
    }

    button,input,select,textarea{
      font:inherit;
      outline:none;
    }

    button{
      cursor:pointer;
      border:none;
      background:none;
    }

    a{color:var(--ac);text-decoration:none}

    /* SIDEBAR */
    #sidebar{
      width:var(--sw);
      flex-shrink:0;
      background:var(--bg2);
      border-right:1px solid var(--brd);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:width .22s ease;
    }
    #sidebar.collapsed{width:60px}
    #sidebar.collapsed .hid{
      width:0;
      opacity:0;
      overflow:hidden;
      pointer-events:none;
    }

    .sb-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px 11px;
      border-bottom:1px solid var(--brd);
      gap:8px;
      flex-shrink:0;
    }
    .sb-logo{
      display:flex;
      align-items:center;
      gap:9px;
      color:var(--ac);
      min-width:0;
    }
    .sb-brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      white-space:nowrap;
      transition:.2s;
    }
    .bn{
      font-family:'Montserrat',sans-serif;
      font-size:16px;
      font-weight:900;
      color:var(--ac);
    }
    .bs{
      font-size:9px;
      font-weight:800;
      color:var(--ac2);
      text-transform:uppercase;
      letter-spacing:1.5px;
    }
    #btnToggle{
      width:26px;
      height:26px;
      border-radius:7px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:.2s;
    }
    #btnToggle:hover{border-color:var(--ac);color:var(--ac)}

    .sb-nav{
      flex:1;
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:3px;
      overflow-y:auto;
    }

    .nb{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:11px 10px;
      border-radius:10px;
      color:var(--mut);
      text-align:left;
      transition:.2s;
      white-space:nowrap;
    }
    .nb:hover{background:var(--bg3);color:var(--txt)}
    .nb.on{background:rgba(255,179,0,.1);color:var(--ac)}

    .sb-ac{
      border-top:1px solid var(--brd);
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .lbl{
      font-size:10px;
      color:var(--mut);
      text-transform:uppercase;
      letter-spacing:1px;
      padding:3px 5px;
      white-space:nowrap;
      transition:.2s;
    }
    .ab{
      display:flex;
      align-items:center;
      gap:9px;
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      white-space:nowrap;
    }
    .ab:hover{border-color:var(--ac);color:var(--ac)}
    .sb-ft{
      border-top:1px solid var(--brd);
      padding:13px 11px;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .sb-ft span{
      font-family:'Montserrat',sans-serif;
      font-size:12px;
      font-weight:900;
      color:var(--ac);
      white-space:nowrap;
      transition:.2s;
    }
    .sb-ft small{
      font-size:10px;
      color:var(--mut);
      white-space:nowrap;
      transition:.2s;
    }

    /* MAIN */
    #main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      overflow:hidden;
    }

    #topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:15px 20px;
      border-bottom:1px solid var(--brd);
      background:#0d0d0d;
      flex-shrink:0;
    }

    #pgTitle{
      font-family:'Montserrat',sans-serif;
      font-size:25px;
      font-weight:900;
      letter-spacing:-.4px;
    }

    .tb-r{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .sbox{
      display:flex;
      align-items:center;
      gap:7px;
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:11px;
    }
    .sbox input{
      background:transparent;
      border:none;
      color:var(--txt);
      width:260px;
    }
    .sbox input::placeholder{color:var(--mut)}

    /* BUTTONS */
    .bac{
      padding:10px 16px;
      border-radius:11px;
      font-weight:700;
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      color:#111;
      transition:.2s;
    }
    .bac:hover{filter:brightness(1.08)}

    .bgh{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--txt);
      transition:.2s;
    }
    .bgh:hover{border-color:var(--ac);color:var(--ac)}

    .bdn{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.25);
      color:var(--err);
      transition:.2s;
    }
    .bdn:hover{background:rgba(239,68,68,.15)}

    .bsm{
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      flex-shrink:0;
    }
    .bsm:hover{border-color:var(--ac);color:var(--ac)}

    .bx{
      color:var(--sub);
      font-size:20px;
      transition:.2s;
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .bx:hover{background:var(--bg3);color:var(--txt)}

    .tv{
      width:34px;
      height:34px;
      border-radius:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
    }
    .tv.on{background:rgba(255,179,0,.1);border-color:rgba(255,179,0,.3);color:var(--ac)}

    /* VIEWS */
    .view{
      display:none;
      flex:1;
      overflow-y:auto;
      padding:18px 20px 40px;
    }
    .view.on{display:block}

    /* STATS */
    .stats-g{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:11px;
      margin-bottom:18px;
    }
    .sc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-top:3px solid transparent;
      border-radius:var(--r);
      padding:15px;
    }
    .sc-v{
      font-size:30px;
      font-weight:900;
      line-height:1;
      margin-bottom:5px;
    }
    .sc-l{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.7px;
      font-weight:700;
    }

    /* DASH */
    .dash-c{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:13px;
    }
    .card{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      overflow:hidden;
    }
    .card-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
    }
    .card-h span{
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:var(--sub);
    }
    .bdg{
      background:rgba(255,179,0,.1);
      color:var(--ac);
      border-radius:20px;
      padding:2px 10px;
      font-size:12px;
      font-weight:800;
    }

    .ai{
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .ai:last-child{border-bottom:none}
    .ai:hover{background:var(--bg3)}
    .ai-d{
      width:9px;height:9px;border-radius:50%;flex-shrink:0;
    }
    .ai-ico{
      width:32px;height:32px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .ai-inf{
      flex:1;min-width:0;
    }
    .ai-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ai-inf small{
      color:var(--sub);
      font-size:11px;
    }
    .ai-tg{
      padding:3px 9px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }

    /* TOOLBAR */
    .tlb{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:15px;
    }
    .flt{
      display:flex;
      gap:8px;
    }
    .flt select{
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .tvg{display:flex;gap:5px}

    /* GRADE */
    .grade{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(275px,1fr));
      gap:13px;
    }
    .grade.ls{grid-template-columns:1fr}
    .vc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      padding:15px;
      cursor:pointer;
      transition:.18s;
    }
    .vc:hover{
      border-color:rgba(255,179,0,.3);
      transform:translateY(-1px);
      box-shadow:0 8px 22px rgba(0,0,0,.28);
    }
    .vc-tp{
      display:flex;
      align-items:flex-start;
      gap:11px;
      margin-bottom:11px;
    }
    .vc-ico{
      width:40px;height:40px;border-radius:10px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .vc-nm{font-size:14px;font-weight:700;line-height:1.2}
    .vc-pl{font-size:12px;color:var(--sub);margin-top:3px;letter-spacing:.4px}
    .vc-mt{
      display:flex;
      flex-direction:column;
      gap:4px;
      font-size:12px;
      color:var(--sub);
      margin-bottom:11px;
    }
    .vc-ft{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .vc-ac{display:flex;gap:5px}

    /* STATUS */
    .st{
      padding:3px 10px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
    }
    .stR{background:rgba(34,197,94,.1);color:#22c55e}
    .stP{background:rgba(245,158,11,.1);color:#f59e0b}
    .stV{background:rgba(239,68,68,.1);color:#ef4444}

    /* VENCIMENTOS */
    .vr{
      display:grid;
      grid-template-columns:1fr 130px 130px 175px;
      align-items:center;
      gap:14px;
      padding:13px 16px;
      background:var(--bg2);
      border:1px solid var(--brd);
      border-left:3px solid transparent;
      border-radius:var(--r);
      margin-bottom:8px;
      cursor:pointer;
      transition:.18s;
    }
    .vr:hover{background:var(--bg3)}
    .vr-nm{font-size:14px;font-weight:700}
    .vr-sb{font-size:12px;color:var(--sub);margin-top:2px}
    .vr-tp{font-size:13px;font-weight:600;color:var(--sub)}
    .vr-dt{font-size:13px;font-weight:600}
    .vr-ds{font-size:13px;font-weight:800;text-align:right}

    /* DOCS VIEW */
    .db{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      margin-bottom:13px;
      overflow:hidden;
    }
    .db-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .db-h:hover{background:var(--bg3)}
    .dr{
      display:flex;
      align-items:center;
      gap:11px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      transition:.15s;
    }
    .dr:last-child{border-bottom:none}
    .dr:hover{background:var(--bg3)}
    .dr-ico{
      width:34px;height:34px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .dr-inf{flex:1;min-width:0}
    .dr-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dr-inf small{color:var(--sub);font-size:11px}

    /* MODAL */
    .ov{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(5px);
      z-index:200;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s;
    }
    .ov.on{opacity:1;pointer-events:all}

    .modal{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:18px;
      width:92%;
      max-width:680px;
      max-height:90vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
    }
    .modal.lg{max-width:880px}
    .mh{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:17px 20px;
      border-bottom:1px solid var(--brd);
      flex-shrink:0;
    }
    .mh h2{
      font-family:'Montserrat',sans-serif;
      font-size:19px;
      font-weight:900;
    }
    .mb{
      flex:1;
      overflow-y:auto;
      padding:20px;
    }
    .mf{
      display:flex;
      justify-content:flex-end;
      gap:9px;
      padding:16px 20px;
      border-top:1px solid var(--brd);
      flex-shrink:0;
    }

    /* FORM */
    .fsec{margin-bottom:20px}
    .ftit{
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:1px;
      color:var(--ac);
      margin-bottom:13px;
      padding-bottom:8px;
      border-bottom:1px solid var(--brd);
    }
    .fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
    .fg{
      display:flex;
      flex-direction:column;
      gap:5px;
      margin-bottom:0;
    }
    .fg label{
      font-size:11px;
      font-weight:600;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    .fg input,.fg select,.fg textarea{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:9px;
      padding:10px 11px;
      color:var(--txt);
      transition:.2s;
      width:100%;
    }
    .fg input:focus,.fg select:focus,.fg textarea:focus{
      border-color:rgba(255,179,0,.5);
    }
    .fg textarea{resize:vertical}

    /* DETALHE */
    .det-g{
      display:grid;
      grid-template-columns:1fr 340px;
      gap:17px;
    }
    .det-c{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:var(--r);
      padding:16px;
      margin-bottom:14px;
    }
    .det-th{
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:1px;
      color:var(--ac);
      margin-bottom:13px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .inf-g{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .inf{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:10px;
      padding:10px 11px;
    }
    .inf label{
      display:block;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:var(--sub);
      margin-bottom:4px;
      font-weight:700;
    }
    .inf span{
      font-size:13px;
      font-weight:600;
      word-break:break-word;
    }
    .upl{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .up-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .doc-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:11px 12px;
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:10px;
      margin-top:8px;
    }
    .doc-line small{color:var(--sub)}

    /* EMPTY */
    .empty{
      padding:30px 20px;
      text-align:center;
      background:var(--bg2);
      border:1px dashed var(--brd);
      border-radius:var(--r);
      color:var(--sub);
    }
    .empty h3{color:var(--txt);margin-top:10px;margin-bottom:6px}
    .empty p{font-size:13px}

    /* TOASTS */
    #toasts{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:500;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .toast{
      min-width:260px;
      background:#121212;
      border:1px solid var(--brd);
      border-left:4px solid var(--ac);
      border-radius:12px;
      padding:12px 14px;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      gap:10px;
      animation:up .2s ease;
    }
    .toast.ok{border-left-color:var(--ok)}
    .toast.warn{border-left-color:var(--warn)}
    .toast.err{border-left-color:var(--err)}
    .toast .dot{
      width:9px;height:9px;border-radius:50%;
      flex-shrink:0;
      background:var(--ac);
    }

    @keyframes up{
      from{transform:translateY(8px);opacity:0}
      to{transform:translateY(0);opacity:1}
    }

    @media (max-width:1200px){
      .stats-g{grid-template-columns:repeat(2,1fr)}
      .dash-c{grid-template-columns:1fr}
      .det-g{grid-template-columns:1fr}
      .vr{grid-template-columns:1fr 120px 120px 140px}
    }
    @media (max-width:820px){
      body{overflow:auto}
      #sidebar{position:fixed;z-index:50;height:100vh}
      #main{margin-left:60px}
      .stats-g{grid-template-columns:1fr}
      .vr{grid-template-columns:1fr}
      .fg2,.fg3,.inf-g,.up-row{grid-template-columns:1fr}
      .sbox input{width:120px}
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div class="sb-h">
      <div class="sb-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
        <div class="sb-brand hid">
          <span class="bn">MeR</span>
          <span class="bs">Seminovos</span>
        </div>
      </div>
      <button id="btnToggle">‹</button>
    </div>

    <nav class="sb-nav">
      <button class="nb on" data-view="dashboard">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

  <div id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'mer_seminovos_db_v1';
      const $ = id => document.getElementById(id);
      const $$ = sel => Array.from(document.querySelectorAll(sel));

      const DATAS = [
        { k:'ipva', label:'IPVA' },
        { k:'licenciamento', label:'Licenciamento' },
        { k:'seguro', label:'Seguro' },
        { k:'cnh', label:'CNH' },
        { k:'revisao', label:'Revisao' },
        { k:'vistoria', label:'Vistoria' }
      ];

      let DB = [];
      let VIEW = 'dashboard';
      let QUERY = '';
      let LISTA = false;
      let EDIT_ID = null;
      let DET_ID = null;

      function uid(){
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
      }

      function norm(s){
        return String(s ?? '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      }

      function esc(v){
        return String(v ?? '')
          .replaceAll('&','&')
          .replaceAll('<','<')
          .replaceAll('>','>')
          .replaceAll('"','&quot;')
          .replaceAll("'",'&#39;');
      }

      function toast(msg, type='ok'){
        const wrap = $('toasts');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `<span class="dot"></span><span>${esc(msg)}</span>`;
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }

      function loadDB(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        }catch{
          return [];
        }
      }

      function saveDB(){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
      }

      function fmtDate(v){
        if (!v) return '—';
        const d = new Date(v);
        if (isNaN(d)) return '—';
        return d.toLocaleDateString('pt-BR');
      }

      function startOfDay(d){
        const x = new Date(d);
        x.setHours(0,0,0,0);
        return x;
      }

      function diffDays(dateStr){
        if (!dateStr) return null;
        const d = new Date(dateStr + 'T00:00:00');
        if (isNaN(d)) return null;
        return Math.ceil((d - startOfDay(new Date())) / 86400000);
      }

      function corDias(d){
        return d < 0 ? '#ef4444' : d <= 15 ? '#f59e0b' : '#22c55e';
      }

      function txtDias(d){
        return d < 0 ? `Vencido ha ${Math.abs(d)}d` : d === 0 ? 'Vence hoje' : `${d}d restantes`;
      }

      function stClass(s){
        if (s === 'Pendente') return 'stP';
        if (s === 'Vencido') return 'stV';
        return 'stR';
      }

      function carIcon(size=20){
        return `
          <svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
            <rect x="9" y="11" width="14" height="10" rx="2"/>
            <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          </svg>
        `;
      }

      function editIcon(){
        return `
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        `;
      }

      function trashIcon(){
        return `
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        `;
      }

      function docIcon(size=20){
        return `
          <svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
          </svg>
        `;
      }

      function calIcon(size=20){
        return `
          <svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
        `;
      }

      function pick(row, aliases){
        const keys = Object.keys(row || {});
        for (const alias of aliases){
          const found = keys.find(k => norm(k) === norm(alias));
          if (found !== undefined) return String(row[found] ?? '').trim();
        }
        return '';
      }

      function parseDateValue(value){
        if (!value) return '';
        if (value instanceof Date && !isNaN(value)) return value.toISOString().slice(0,10);
        const s = String(value).trim();
        const br = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (br) return `${br[3]}-${br[2]}-${br[1]}`;
        const d = new Date(s);
        return isNaN(d) ? '' : d.toISOString().slice(0,10);
      }

      function mapRow(row){
        return {
          id: uid(),
          criadoEm: new Date().toISOString(),
          atualizadoEm: new Date().toISOString(),
          documentos: [],
          apelido: pick(row, ['Apelido','Nome','Apelido / Nome']),
          placa: pick(row, ['Placa']),
          tipo: pick(row, ['Tipo']),
          status: pick(row, ['Status']) || 'Regular',
          marca: pick(row, ['Marca']),
          modelo: pick(row, ['Modelo']),
          ano: pick(row, ['Ano']),
          cor: pick(row, ['Cor']),
          renavam: pick(row, ['RENAVAM','Renavam']),
          chassi: pick(row, ['Chassi']),
          proprietario: pick(row, ['Proprietario','Proprietário']),
          obs: pick(row, ['Observacoes','Observações','Obs']),
          ipva: parseDateValue(pick(row, ['IPVA','Venc. IPVA','Vencimento IPVA'])),
          licenciamento: parseDateValue(pick(row, ['Licenciamento','Venc. Licenciamento'])),
          seguro: parseDateValue(pick(row, ['Seguro','Venc. Seguro'])),
          cnh: parseDateValue(pick(row, ['CNH','Venc. CNH'])),
          revisao: parseDateValue(pick(row, ['Revisao','Revisão','Proxima Revisao','Próxima Revisão'])),
          vistoria: parseDateValue(pick(row, ['Vistoria']))
        };
      }

      function bind(){
        document.querySelectorAll('.nb').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.nb').forEach(x => x.classList.remove('on'));
            btn.classList.add('on');
            goView(btn.dataset.view);
          });
        });

        $('btnToggle').addEventListener('click', () => {
          $('sidebar').classList.toggle('collapsed');
        });

        $('btnNovoVeiculo').addEventListener('click', () => openModal());

        $('btnGrade').addEventListener('click', () => {
          LISTA = false;
          $('btnGrade').classList.add('on');
          $('btnLista').classList.remove('on');
          if (VIEW === 'veiculos') renderVeiculos();
        });

        $('btnLista').addEventListener('click', () => {
          LISTA = true;
          $('btnLista').classList.add('on');
          $('btnGrade').classList.remove('on');
          if (VIEW === 'veiculos') renderVeiculos();
        });

        $('searchInput').addEventListener('input', e => {
          QUERY = e.target.value.toLowerCase().trim();
          if (VIEW === 'veiculos') renderVeiculos();
        });

        $('filtroTipo').addEventListener('change', () => {
          if (VIEW === 'veiculos') renderVeiculos();
        });

        $('filtroStatus').addEventListener('change', () => {
          if (VIEW === 'veiculos') renderVeiculos();
        });

        $('btnSalvar').addEventListener('click', saveVehicle);
        $('btnCancelar').addEventListener('click', closeModal);
        $('closeModal').addEventListener('click', closeModal);
        $('modalVeiculo').addEventListener('click', e => {
          if (e.target === e.currentTarget) closeModal();
        });

        $('closeDetalhe').addEventListener('click', closeDetalhe);
        $('modalDetalhe').addEventListener('click', e => {
          if (e.target === e.currentTarget) closeDetalhe();
        });

        $('btnExportar').addEventListener('click', exportarXLS);

        $('btnImportar').addEventListener('click', () => {
          $('inputImportar').click();
        });

        $('inputImportar').addEventListener('change', e => {
          const file = e.target.files[0];
          if (file) importarArquivo(file);
          e.target.value = '';
        });

        document.addEventListener('click', e => {
          const editBtn = e.target.closest('[data-action="edit"]');
          const delBtn = e.target.closest('[data-action="del"]');
          const card = e.target.closest('[data-vid]');
          const docDel = e.target.closest('[data-deldoc]');
          const docOpen = e.target.closest('[data-docopen]');
          const detEdit = e.target.closest('#detEdit');
          const detDelete = e.target.closest('#detDelete');
          const upBtn = e.target.closest('#btnUploadDoc');

          if (editBtn) {
            openModal(editBtn.dataset.id);
            return;
          }

          if (delBtn) {
            deleteVehicle(delBtn.dataset.id);
            return;
          }

          if (docOpen) {
            window.open(docOpen.dataset.docopen, '_blank');
            return;
          }

          if (docDel) {
            if (!DET_ID) return;
            deleteDoc(DET_ID, docDel.dataset.deldoc);
            return;
          }

          if (detEdit) {
            closeDetalhe();
            openModal(DET_ID);
            return;
          }

          if (detDelete) {
            deleteVehicle(DET_ID);
            return;
          }

          if (upBtn) {
            uploadDoc(DET_ID);
            return;
          }

          if (card && !e.target.closest('button') && !e.target.closest('a')) {
            openDetalhe(card.dataset.vid);
            return;
          }
        });
      }

      function goView(v){
        VIEW = v;
        document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
        $('view-' + v).classList.add('on');
        const t = {
          dashboard:'Dashboard',
          veiculos:'Veiculos',
          vencimentos:'Vencimentos',
          documentos:'Documentos'
        };
        $('pgTitle').textContent = t[v] || v;

        if (v === 'dashboard') renderDashboard();
        if (v === 'veiculos') renderVeiculos();
        if (v === 'vencimentos') renderVencimentos();
        if (v === 'documentos') renderDocumentos();
      }

      function renderDashboard(){
        const stats = [
          { l:'Total', v:DB.length, c:'#ffb300' },
          { l:'Regulares', v:DB.filter(x => x.status === 'Regular').length, c:'#22c55e' },
          { l:'Pendentes', v:DB.filter(x => x.status === 'Pendente').length, c:'#f59e0b' },
          { l:'Vencidos', v:DB.filter(x => x.status === 'Vencido').length, c:'#ef4444' },
          { l:'Documentos', v:DB.reduce((a,x) => a + ((x.documentos || []).length), 0), c:'#ff7a18' }
        ];

        $('statsGrid').innerHTML = stats.map((s, i) => `
          <div class="sc" style="animation-delay:${i * .06}s;border-top-color:${s.c}">
            <div class="sc-v" style="color:${s.c}">${s.v}</div>
            <div class="sc-l">${s.l}</div>
          </div>
        `).join('');

        renderAlertas();
        renderUltimos();
      }

      function renderAlertas(){
        const hoje = startOfDay(new Date());
        const lista = [];

        DB.forEach(v => {
          DATAS.forEach(c => {
            const d = diffDays(v[c.k]);
            if (d !== null && d <= 60) {
              lista.push({
                id: v.id,
                nome: v.apelido || v.placa || 'Sem nome',
                tipo: c.label,
                d,
                data: v[c.k]
              });
            }
          });
        });

        lista.sort((a,b) => a.d - b.d);
        $('countAlertas').textContent = String(lista.length);

        if (!lista.length) {
          $('alertasVencimento').innerHTML = `
            <div class="empty" style="margin:12px">
              <h3>Nenhum vencimento proximo</h3>
              <p>Os proximos 60 dias estao livres.</p>
            </div>
          `;
          return;
        }

        $('alertasVencimento').innerHTML = lista.slice(0,7).map(a => {
          const c = corDias(a.d);
          return `
            <div class="ai" data-vid="${a.id}">
              <div class="ai-d" style="background:${c}"></div>
              <div class="ai-inf">
                <strong>${esc(a.nome)}</strong>
                <small>${esc(a.tipo)} — ${fmtDate(a.data)}</small>
              </div>
              <span class="ai-tg" style="background:${c}22;color:${c}">${txtDias(a.d)}</span>
            </div>
          `;
        }).join('');
      }

      function renderUltimos(){
        const sorted = DB.slice().sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));
        if (!sorted.length) {
          $('ultimosCadastros').innerHTML = `
            <div class="empty" style="margin:12px">
              <h3>Nenhum veiculo cadastrado</h3>

          `;

        $('ultimosCadastros').innerHTML = sorted.slice(0,6).map(v => {

          return `
            <div class="ai" data-vid="${v.id}">
              <div class="ai-ico">${carIcon(15)}</div>
              <div class="ai-inf">
                <strong>${esc(v.apelido || 'Sem nome')}</strong>
                <small>${esc(sub || '—')}</small>
              </div>
              <span class="st ${stClass(v.status)}">${esc(v.status || 'Regular')}</span>
            </div>
          `;
        }).join('');
      }

      function renderVeiculos(){
        const tipo = $('filtroTipo').value;
        const status = $('filtroStatus').value;

        const lista = DB.filter(v => {
          const q = !QUERY ||
            (v.apelido || '').toLowerCase().includes(QUERY) ||
            (v.placa || '').toLowerCase().includes(QUERY) ||
            (v.marca || '').toLowerCase().includes(QUERY) ||
            (v.modelo || '').toLowerCase().includes(QUERY) ||
            (v.proprietario || '').toLowerCase().includes(QUERY);

          return q && (!tipo || v.tipo === tipo) && (!status || v.status === status);
        });

        const el = $('veiculosGrid');
        LISTA ? el.classList.add('ls') : el.classList.remove('ls');

        if (!lista.length) {
          el.innerHTML = `
            <div class="empty" style="grid-column:1/-1">
              ${carIcon(46)}
              <h3>Nenhum veiculo encontrado</h3>
              <p>Clique em "+ Novo Veiculo" para cadastrar.</p>
            </div>
          `;
          return;
        }

        el.innerHTML = lista.map((v, i) => {
          const pv = proxVenc(v);
          const meta = [];
          if (v.marca || v.modelo || v.ano) meta.push(`<span><strong>${esc(v.marca || '')}</strong> ${esc(v.modelo || '')} ${esc(v.ano || '')}</span>`);
          if (v.cor) meta.push(`<span>Cor: <strong>${esc(v.cor)}</strong></span>`);
          if (v.proprietario) meta.push(`<span>Prop: <strong>${esc(v.proprietario)}</strong></span>`);
          if (pv) meta.push(`<span style="color:${pv.c}">${esc(pv.l)}: ${esc(pv.t)}</span>`);

          return `
            <div class="vc" data-vid="${v.id}" style="animation-delay:${i * .04}s">
              <div class="vc-tp">
                <div class="vc-ico">${carIcon(21)}</div>
                <div>
                  <div class="vc-nm">${esc(v.apelido || 'Sem nome')}</div>
                  <div class="vc-pl">${esc(v.placa || '---')}</div>
                </div>
              </div>
              <div class="vc-mt">${meta.join('')}</div>
              <div class="vc-ft">
                <span class="st ${stClass(v.status)}">${esc(v.status || 'Regular')}</span>
                <div class="vc-ac">
                  <button class="bsm" data-action="edit" data-id="${v.id}" title="Editar">${editIcon()}</button>
                  <button class="bsm" data-action="del" data-id="${v.id}" title="Excluir">${trashIcon()}</button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      function proxVenc(v){
        let menor = null;
        DATAS.forEach(c => {
          if (!v[c.k]) return;
          const d = diffDays(v[c.k]);
          if (d === null) return;
          if (!menor || d < menor.d) {
            menor = { l:c.label, d, c:corDias(d), t:txtDias(d) };
          }
        });
        return menor;
      }

      function renderVencimentos(){
        const rows = [];
        DB.forEach(v => {
          DATAS.forEach(c => {
            if (!v[c.k]) return;
            const d = diffDays(v[c.k]);
            if (d === null) return;
            rows.push({ v, c, d, data:v[c.k] });
          });
        });

        rows.sort((a,b) => a.d - b.d);

        const el = $('vencimentosWrap');
        if (!rows.length) {
          el.innerHTML = `
            <div class="empty">
              ${calIcon(46)}
              <h3>Nenhuma data cadastrada</h3>
              <p>Adicione datas nos veiculos para acompanhar aqui.</p>
            </div>
          `;
          return;
        }

        el.innerHTML = rows.map((r, i) => {
          const cor = corDias(r.d);
          const txt = r.d < 0 ? `Vencido ha ${Math.abs(r.d)} dias` : r.d === 0 ? 'Vence hoje' : `${r.d} dias restantes`;
          return `
            <div class="vr" data-vid="${r.v.id}" style="animation-delay:${i * .03}s;border-left-color:${cor}">
              <div>
                <div class="vr-nm">${esc(r.v.apelido || 'Sem nome')}</div>
                <div class="vr-sb">${esc(r.v.placa || '')} ${esc(r.v.marca || '')} ${esc(r.v.modelo || '')}</div>
              </div>
              <div class="vr-tp">${esc(r.c.label)}</div>
              <div class="vr-dt">${fmtDate(r.data)}</div>
              <div class="vr-ds" style="color:${cor}">${txt}</div>
            </div>
          `;
        }).join('');
      }

      function renderDocumentos(){
        const el = $('documentosWrap');
        const com = DB.filter(v => (v.documentos || []).length > 0);

        if (!com.length) {
          el.innerHTML = `
            <div class="empty">
              ${docIcon(46)}
              <h3>Nenhum documento salvo</h3>
              <p>Abra um veiculo e adicione documentos no detalhe.</p>
            </div>
          `;
          return;
        }

        el.innerHTML = com.map(v => {
          const docs = v.documentos || [];
          return `
            <div class="db" data-vid="${v.id}">
              <div class="db-h">
                <div style="display:flex;align-items:center;gap:9px">
                  ${carIcon(15)}
                  <strong>${esc(v.apelido || v.placa || 'Sem nome')}</strong>
                </div>
                <span class="bdg">${docs.length} doc${docs.length !== 1 ? 's' : ''}</span>
              </div>
              ${docs.map(d => `
                <div class="dr">
                  <div class="dr-ico">${docIcon(15)}</div>
                  <div class="dr-inf">
                    <strong>${esc(d.nome)}</strong>
                    <small>${esc(d.tipo)}${d.size ? ' — ' + fmtBytes(d.size) : ''}</small>
                  </div>
                  <div style="display:flex;gap:6px;align-items:center">
                    ${d.url ? `<a class="bgh" href="${d.url}" download="${esc(d.nome)}" target="_blank" style="font-size:12px;padding:6px 10px">Baixar</a>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }).join('');
      }
