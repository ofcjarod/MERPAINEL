<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeR Seminovos CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#080808;
      --bg2:#111;
      --bg3:#181818;
      --bg4:#222;
      --brd:#2a2a2a;
      --txt:#f0f0f0;
      --sub:#9a9a9a;
      --mut:#5d5d5d;
      --ac:#ffb300;
      --ac2:#ff7a18;
      --ok:#22c55e;
      --warn:#f59e0b;
      --err:#ef4444;
      --r:12px;
      --sw:240px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--txt);
      display:flex;
    }

    button,input,select,textarea{
      font:inherit;
      outline:none;
    }

    button{
      cursor:pointer;
      border:none;
      background:none;
    }

    a{color:var(--ac);text-decoration:none}

    /* SIDEBAR */
    #sidebar{
      width:var(--sw);
      flex-shrink:0;
      background:var(--bg2);
      border-right:1px solid var(--brd);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transition:width .22s ease;
    }
    #sidebar.collapsed{width:60px}
    #sidebar.collapsed .hid{
      width:0;
      opacity:0;
      overflow:hidden;
      pointer-events:none;
    }

    .sb-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px 11px;
      border-bottom:1px solid var(--brd);
      gap:8px;
      flex-shrink:0;
    }
    .sb-logo{
      display:flex;
      align-items:center;
      gap:9px;
      color:var(--ac);
      min-width:0;
    }
    .sb-brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      white-space:nowrap;
      transition:.2s;
    }
    .bn{
      font-family:'Montserrat',sans-serif;
      font-size:16px;
      font-weight:900;
      color:var(--ac);
    }
    .bs{
      font-size:9px;
      font-weight:800;
      color:var(--ac2);
      text-transform:uppercase;
      letter-spacing:1.5px;
    }
    #btnToggle{
      width:26px;
      height:26px;
      border-radius:7px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:.2s;
    }
    #btnToggle:hover{border-color:var(--ac);color:var(--ac)}

    .sb-nav{
      flex:1;
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:3px;
      overflow-y:auto;
    }

    .nb{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:11px 10px;
      border-radius:10px;
      color:var(--mut);
      text-align:left;
      transition:.2s;
      white-space:nowrap;
    }
    .nb:hover{background:var(--bg3);color:var(--txt)}
    .nb.on{background:rgba(255,179,0,.1);color:var(--ac)}

    .sb-ac{
      border-top:1px solid var(--brd);
      padding:9px 7px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .lbl{
      font-size:10px;
      color:var(--mut);
      text-transform:uppercase;
      letter-spacing:1px;
      padding:3px 5px;
      white-space:nowrap;
      transition:.2s;
    }
    .ab{
      display:flex;
      align-items:center;
      gap:9px;
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      white-space:nowrap;
    }
    .ab:hover{border-color:var(--ac);color:var(--ac)}
    .sb-ft{
      border-top:1px solid var(--brd);
      padding:13px 11px;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .sb-ft span{
      font-family:'Montserrat',sans-serif;
      font-size:12px;
      font-weight:900;
      color:var(--ac);
      white-space:nowrap;
      transition:.2s;
    }
    .sb-ft small{
      font-size:10px;
      color:var(--mut);
      white-space:nowrap;
      transition:.2s;
    }

    /* MAIN */
    #main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      overflow:hidden;
    }

    #topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:15px 20px;
      border-bottom:1px solid var(--brd);
      background:#0d0d0d;
      flex-shrink:0;
    }

    #pgTitle{
      font-family:'Montserrat',sans-serif;
      font-size:25px;
      font-weight:900;
      letter-spacing:-.4px;
    }

    .tb-r{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .sbox{
      display:flex;
      align-items:center;
      gap:7px;
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:11px;
    }
    .sbox input{
      background:transparent;
      border:none;
      color:var(--txt);
      width:260px;
    }
    .sbox input::placeholder{color:var(--mut)}

    /* BUTTONS */
    .bac{
      padding:10px 16px;
      border-radius:11px;
      font-weight:700;
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      color:#111;
      transition:.2s;
    }
    .bac:hover{filter:brightness(1.08)}

    .bgh{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--txt);
      transition:.2s;
    }
    .bgh:hover{border-color:var(--ac);color:var(--ac)}

    .bdn{
      padding:9px 14px;
      border-radius:10px;
      font-weight:600;
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.25);
      color:var(--err);
      transition:.2s;
    }
    .bdn:hover{background:rgba(239,68,68,.15)}

    .bsm{
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
      flex-shrink:0;
    }
    .bsm:hover{border-color:var(--ac);color:var(--ac)}

    .bx{
      color:var(--sub);
      font-size:20px;
      transition:.2s;
      width:30px;
      height:30px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .bx:hover{background:var(--bg3);color:var(--txt)}

    .tv{
      width:34px;
      height:34px;
      border-radius:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg3);
      border:1px solid var(--brd);
      color:var(--sub);
      transition:.2s;
    }
    .tv.on{background:rgba(255,179,0,.1);border-color:rgba(255,179,0,.3);color:var(--ac)}

    /* VIEWS */
    .view{
      display:none;
      flex:1;
      overflow-y:auto;
      padding:18px 20px 40px;
    }
    .view.on{display:block}

    /* STATS */
    .stats-g{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:11px;
      margin-bottom:18px;
    }
    .sc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-top:3px solid transparent;
      border-radius:var(--r);
      padding:15px;
    }
    .sc-v{
      font-size:30px;
      font-weight:900;
      line-height:1;
      margin-bottom:5px;
    }
    .sc-l{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.7px;
      font-weight:700;
    }

    /* DASH */
    .dash-c{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:13px;
    }
    .card{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      overflow:hidden;
    }
    .card-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
    }
    .card-h span{
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.6px;
      color:var(--sub);
    }
    .bdg{
      background:rgba(255,179,0,.1);
      color:var(--ac);
      border-radius:20px;
      padding:2px 10px;
      font-size:12px;
      font-weight:800;
    }

    .ai{
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .ai:last-child{border-bottom:none}
    .ai:hover{background:var(--bg3)}
    .ai-d{
      width:9px;height:9px;border-radius:50%;flex-shrink:0;
    }
    .ai-ico{
      width:32px;height:32px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .ai-inf{
      flex:1;min-width:0;
    }
    .ai-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ai-inf small{
      color:var(--sub);
      font-size:11px;
    }
    .ai-tg{
      padding:3px 9px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
      white-space:nowrap;
    }

    /* TOOLBAR */
    .tlb{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:15px;
    }
    .flt{
      display:flex;
      gap:8px;
    }
    .flt select{
      padding:9px 12px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .tvg{display:flex;gap:5px}

    /* GRADE */
    .grade{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(275px,1fr));
      gap:13px;
    }
    .grade.ls{grid-template-columns:1fr}
    .vc{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      padding:15px;
      cursor:pointer;
      transition:.18s;
    }
    .vc:hover{
      border-color:rgba(255,179,0,.3);
      transform:translateY(-1px);
      box-shadow:0 8px 22px rgba(0,0,0,.28);
    }
    .vc-tp{
      display:flex;
      align-items:flex-start;
      gap:11px;
      margin-bottom:11px;
    }
    .vc-ico{
      width:40px;height:40px;border-radius:10px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .vc-nm{font-size:14px;font-weight:700;line-height:1.2}
    .vc-pl{font-size:12px;color:var(--sub);margin-top:3px;letter-spacing:.4px}
    .vc-mt{
      display:flex;
      flex-direction:column;
      gap:4px;
      font-size:12px;
      color:var(--sub);
      margin-bottom:11px;
    }
    .vc-ft{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .vc-ac{display:flex;gap:5px}

    /* STATUS */
    .st{
      padding:3px 10px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
    }
    .stR{background:rgba(34,197,94,.1);color:#22c55e}
    .stP{background:rgba(245,158,11,.1);color:#f59e0b}
    .stV{background:rgba(239,68,68,.1);color:#ef4444}

    /* VENCIMENTOS */
    .vr{
      display:grid;
      grid-template-columns:1fr 130px 130px 175px;
      align-items:center;
      gap:14px;
      padding:13px 16px;
      background:var(--bg2);
      border:1px solid var(--brd);
      border-left:3px solid transparent;
      border-radius:var(--r);
      margin-bottom:8px;
      cursor:pointer;
      transition:.18s;
    }
    .vr:hover{background:var(--bg3)}
    .vr-nm{font-size:14px;font-weight:700}
    .vr-sb{font-size:12px;color:var(--sub);margin-top:2px}
    .vr-tp{font-size:13px;font-weight:600;color:var(--sub)}
    .vr-dt{font-size:13px;font-weight:600}
    .vr-ds{font-size:13px;font-weight:800;text-align:right}

    /* DOCS VIEW */
    .db{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:var(--r);
      margin-bottom:13px;
      overflow:hidden;
    }
    .db-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:13px 15px;
      border-bottom:1px solid var(--brd);
      cursor:pointer;
      transition:.15s;
    }
    .db-h:hover{background:var(--bg3)}
    .dr{
      display:flex;
      align-items:center;
      gap:11px;
      padding:11px 15px;
      border-bottom:1px solid var(--brd);
      transition:.15s;
    }
    .dr:last-child{border-bottom:none}
    .dr:hover{background:var(--bg3)}
    .dr-ico{
      width:34px;height:34px;border-radius:8px;
      background:rgba(255,179,0,.07);
      border:1px solid rgba(255,179,0,.14);
      display:flex;align-items:center;justify-content:center;
      color:var(--ac);flex-shrink:0;
    }
    .dr-inf{
      flex:1;min-width:0;
    }
    .dr-inf strong{
      display:block;
      font-size:13px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dr-inf small{
      color:var(--sub);
      font-size:11px;
    }

    /* MODAL */
    .ov{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(5px);
      z-index:200;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s;
    }
    .ov.on{opacity:1;pointer-events:all}
    .modal{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:18px;
      width:92%;
      max-width:680px;
      max-height:90vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
      overflow:hidden;
    }
    .modal-h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--brd);
    }
    .modal-h h2{
      font-family:'Montserrat',sans-serif;
      font-size:18px;
      font-weight:900;
      color:var(--ac);
    }
    .modal-b{
      padding:16px;
      overflow:auto;
    }
    .fgrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .fg label{
      font-size:11px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
      font-weight:700;
    }
    .fg input,.fg select,.fg textarea{
      padding:10px 11px;
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:10px;
      color:var(--txt);
    }
    .fg textarea{resize:vertical;min-height:88px}
    .fsec{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:14px;
      padding:13px;
      margin-bottom:12px;
    }
    .fsec h3{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:var(--sub);
      margin-bottom:10px;
    }
    .modal-f{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      padding:14px 16px;
      border-top:1px solid var(--brd);
      background:var(--bg2);
    }

    /* DETAIL */
    .det-g{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .det-c{
      background:var(--bg3);
      border:1px solid var(--brd);
      border-radius:14px;
      padding:13px;
    }
    .det-c h3{
      font-size:12px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:10px;
    }
    .det-i{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 12px;
    }
    .det-i div{
      background:var(--bg2);
      border:1px solid var(--brd);
      border-radius:10px;
      padding:9px;
    }
    .det-i label{
      display:block;
      font-size:10px;
      color:var(--sub);
      text-transform:uppercase;
      margin-bottom:3px;
    }
    .det-i span{font-size:13px;font-weight:600}
    .doc-add{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto;
      gap:8px;
      align-items:end;
    }
    .doc-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-top:1px solid var(--brd);
    }
    .doc-item:first-child{border-top:none}
    .doc-item .x{
      margin-left:auto;
    }

    /* EMPTY */
    .empty{
      background:var(--bg2);
      border:1px dashed var(--brd);
      border-radius:14px;
      padding:28px;
      text-align:center;
      color:var(--sub);
    }
    .empty h3{
      color:var(--txt);
      margin-top:8px;
      margin-bottom:6px;
    }

    /* TOAST */
    #toasts{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:500;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .toast{
      background:rgba(17,17,17,.96);
      border:1px solid var(--brd);
      border-left:3px solid var(--ac);
      padding:10px 12px;
      border-radius:10px;
      min-width:240px;
      box-shadow:0 14px 30px rgba(0,0,0,.3);
      color:var(--txt);
      font-size:13px;
    }
    .toast.err{border-left-color:var(--err)}
    .toast.ok{border-left-color:var(--ok)}
    .toast.warn{border-left-color:var(--warn)}

    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    @media (max-width: 1200px){
      .stats-g{grid-template-columns:repeat(2,1fr)}
      .dash-c{grid-template-columns:1fr}
      .fgrid,.det-g,.doc-add{grid-template-columns:1fr}
      .vr{grid-template-columns:1fr 120px}
      .vr-dt,.vr-ds{display:none}
    }
  </style>
</head>
<body>
  <aside id="sidebar">
    <div class="sb-h">
      <div class="sb-logo">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
        <div class="sb-brand hid">
          <span class="bn">MeR</span>
          <span class="bs">Seminovos</span>
        </div>
      </div>
      <button id="btnToggle">‹</button>
    </div>

    <nav class="sb-nav">
      <button class="nb on" data-view="dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span class="hid">Dashboard</span>
      </button>

      <button class="nb" data-view="veiculos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
        </svg>
        <span class="hid">Veículos</span>
      </button>

      <button class="nb" data-view="vencimentos">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <span class="hid">Vencimentos</span>
      </button>

  <div id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
  (() => {
    'use strict';

    const KEY = 'mer_seminovos_db_v1';

    const $ = s => document.querySelector(s);
    const $$ = s => [...document.querySelectorAll(s)];
    const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));
    
    const esc = s => String(s ?? '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');

    const norm = s => String(s ?? '')
      .toLowerCase()
      .trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    let db = [];
    let view = 'dashboard';
    let search = '';
    let listMode = false;
    let editId = null;
    let detailId = null;

    const dateFields = [
      {k:'ipva',l:'IPVA'},
      {k:'licenciamento',l:'Licenciamento'},
      {k:'seguro',l:'Seguro'},
      {k:'cnh',l:'CNH'},
      {k:'revisao',l:'Revisão'},
      {k:'vistoria',l:'Vistoria'}
    ];

    function saveDB(){ localStorage.setItem(KEY, JSON.stringify(db)); }
    function loadDB(){
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
      catch { return []; }
    }

    function toast(msg, type='ok'){
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      $('#toasts').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function fmtDate(d){
      if (!d) return '—';
      const x = new Date(d + 'T00:00:00');
      return isNaN(x) ? '—' : x.toLocaleDateString('pt-BR');
    }

    function fmtBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function daysLeft(d){
      if (!d) return null;
      const a = new Date();
      a.setHours(0,0,0,0);
      const b = new Date(d + 'T00:00:00');
      return Math.ceil((b - a) / 86400000);
    }

    function dayColor(n){ return n < 0 ? '#ef4444' : n <= 15 ? '#f59e0b' : '#22c55e'; }
    function dayText(n){ return n < 0 ? `Vencido há ${Math.abs(n)}d` : n === 0 ? 'Vence hoje' : `${n}d restantes`; }
    function statusClass(s){ return s === 'Pendente' ? 'stP' : s === 'Vencido' ? 'stV' : 'stR'; }

    function carIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      </svg>`;
    }
    function editIcon(){
      return `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>`;
    }
    function trashIcon(){
      return `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>`;
    }
    function docIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>`;
    }
    function calIcon(size=20){
      return `<svg width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>`;
    }

    function renderView(v){
      view = v;
      $$('.view').forEach(el => el.classList.remove('on'));
      $(`#view-${v}`).classList.add('on');
      $$('.nb').forEach(b => b.classList.toggle('on', b.dataset.view === v));

      const titles = {dashboard:'Dashboard', veiculos:'Veículos', vencimentos:'Vencimentos', documentos:'Documentos'};
      $('#pgTitle').textContent = titles[v] || v;

      if (v === 'dashboard') renderDashboard();
      if (v === 'veiculos') renderVeiculos();
      if (v === 'vencimentos') renderVencimentos();
      if (v === 'documentos') renderDocumentos();
    }

    function renderDashboard(){
      const stats = [
        {l:'Total', v:db.length, c:'#ffb300'},
        {l:'Regulares', v:db.filter(x => x.status === 'Regular').length, c:'#22c55e'},
        {l:'Pendentes', v:db.filter(x => x.status === 'Pendente').length, c:'#f59e0b'},
        {l:'Vencidos', v:db.filter(x => x.status === 'Vencido').length, c:'#ef4444'},
        {l:'Documentos', v:db.reduce((a,x) => a + (x.documentos || []).length, 0), c:'#ff7a18'}
      ];

      $('#statsGrid').innerHTML = stats.map((s,i) => `
        <div class="sc" style="animation-delay:${i * .04}s;border-top-color:${s.c}">
          <div class="sc-v" style="color:${s.c}">${s.v}</div>
          <div class="sc-l">${s.l}</div>
        </div>
      `).join('');

      const alerts = [];
      db.forEach(v => {
        dateFields.forEach(f => {
          const d = daysLeft(v[f.k]);
          if (d !== null && d <= 60) alerts.push({id:v.id, nome:v.apelido || v.placa || 'Sem nome', tipo:f.l, d, data:v[f.k]});
        });
      });
      alerts.sort((a,b) => a.d - b.d);
      $('#countAlertas').textContent = String(alerts.length);

      $('#alertasVencimento').innerHTML = alerts.length ? alerts.slice(0,7).map(a => {
        const c = dayColor(a.d);
        return `
          <div class="ai" data-id="${a.id}">
            <div class="ai-d" style="background:${c}"></div>
            <div class="ai-inf">
              <strong>${esc(a.nome)}</strong>
              <small>${esc(a.tipo)} — ${fmtDate(a.data)}</small>
            </div>
            <span class="ai-tg" style="background:${c}22;color:${c}">${dayText(a.d)}</span>
          </div>
        `;
      }).join('') : `
        <div class="empty" style="margin:12px">
          <h3>Nenhum vencimento próximo</h3>
          <p>Sem datas nos próximos 60 dias.</p>
        </div>
      `;

      const sorted = db.slice().sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));
      $('#ultimosCadastros').innerHTML = sorted.length ? sorted.slice(0,6).map(v => {
        const sub = [v.marca, v.modelo, v.ano].filter(Boolean).join(' ') + (v.placa ? ` — ${v.placa}` : '');
        return `
          <div class="ai" data-id="${v.id}">
            <div class="ai-ico">${carIcon(15)}</div>
            <div class="ai-inf">
              <strong>${esc(v.apelido || 'Sem nome')}</strong>
              <small>${esc(sub || '—')}</small>
            </div>
            <span class="st ${statusClass(v.status)}">${esc(v.status || 'Regular')}</span>
          </div>
        `;
      }).join('') : `
        <div class="empty" style="margin:12px">
          <h3>Nenhum veículo cadastrado</h3>
          <p>Use o botão “Novo Veículo”.</p>
        </div>
      `;
    }

    function renderVeiculos(){
      const tipo = $('#filtroTipo').value;
      const status = $('#filtroStatus').value;

      const lista = db.filter(v => {
        const q = !search ||
          norm(v.apelido).includes(search) ||
          norm(v.placa).includes(search) ||
          norm(v.marca).includes(search) ||
          norm(v.modelo).includes(search) ||
          norm(v.proprietario).includes(search);
        return q && (!tipo || v.tipo === tipo) && (!status || v.status === status);
      });

      const el = $('#veiculosGrid');
      el.className = listMode ? 'grade ls' : 'grade';

      if (!lista.length){
        el.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <h3>Nenhum veículo encontrado</h3>
            <p>Clique em "+ Novo Veículo" para cadastrar.</p>
          </div>
        `;
        return;
      }

      el.innerHTML = lista.map((v,i) => {
        const pv = nextDue(v);
        const meta = [];
        if (v.marca || v.modelo || v.ano) meta.push("<span><strong>" + esc(v.marca || '') + "</strong> " + esc(v.modelo || '') + " " + esc(v.ano || '') + "</span>");
        if (v.cor) meta.push(`<span>Cor: <strong>${esc(v.cor)}</strong></span>`);
        if (v.proprietario) meta.push(`<span>Prop: <strong>${esc(v.proprietario)}</strong></span>`);
        if (pv) meta.push(`<span style="color:${pv.c}">${esc(pv.l)}: ${esc(pv.t)}</span>`);

        return `
          <div class="vc" data-id="${v.id}" style="animation-delay:${i * .03}s">
            <div class="vc-tp">
              <div class="vc-ico">${carIcon(21)}</div>
              <div>
                <div class="vc-nm">${esc(v.apelido || 'Sem nome')}</div>
                <div class="vc-pl">${esc(v.placa || '---')}</div>
              </div>
            </div>
            <div class="vc-mt">${meta.join('')}</div>
            <div class="vc-ft">
              <span class="st ${statusClass(v.status)}">${esc(v.status || 'Regular')}</span>
              <div class="vc-ac">
                <button class="bsm" data-action="edit" data-id="${v.id}" title="Editar">${editIcon()}</button>
                <button class="bsm" data-action="del" data-id="${v.id}" title="Excluir">${trashIcon()}</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function nextDue(v){
      let best = null;
      dateFields.forEach(f => {
        if (!v[f.k]) return;
        const d = daysLeft(v[f.k]);
        if (d === null) return;
        if (!best || d < best.d) best = {l:f.l, d, c:dayColor(d), t:dayText(d)};
      });
      return best;
    }

    function renderVencimentos(){
      const rows = [];
      db.forEach(v => {
        dateFields.forEach(f => {
          if (!v[f.k]) return;
          const d = daysLeft(v[f.k]);
          if (d === null) return;
          rows.push({v, f, d, data:v[f.k]});
        });
      });

      rows.sort((a,b) => a.d - b.d);

      const el = $('#vencimentosWrap');
      if (!rows.length){
        el.innerHTML = `
          <div class="empty">
            ${calIcon(46)}
            <h3>Nenhuma data cadastrada</h3>
            <p>Adicione datas nos veículos para acompanhar aqui.</p>
          </div>
        `;
        return;
      }

      el.innerHTML = rows.map((r,i) => {
        const c = dayColor(r.d);
        const txt = r.d < 0 ? `Vencido há ${Math.abs(r.d)} dias` : r.d === 0 ? 'Vence hoje' : `${r.d} dias restantes`;
        return `
          <div class="vr" data-id="${r.v.id}" style="animation-delay:${i * .02}s;border-left-color:${c}">
            <div>
              <div class="vr-nm">${esc(r.v.apelido || 'Sem nome')}</div>
              <div class="vr-sb">${esc(r.v.placa || '')} ${esc(r.v.marca || '')} ${esc(r.v.modelo || '')}</div>
            </div>
            <div class="vr-tp">${esc(r.f.l)}</div>
            <div class="vr-dt">${fmtDate(r.data)}</div>
            <div class="vr-ds" style="color:${c}">${txt}</div>
          </div>
        `;
      }).join('');
    }

    function renderDocumentos(){
      const el = $('#documentosWrap');
      const withDocs = db.filter(v => (v.documentos || []).length > 0);

      if (!withDocs.length){
        el.innerHTML = `
          <div class="empty">
            ${docIcon(46)}
            <h3>Nenhum documento salvo</h3>
            <p>Abra um veículo e adicione documentos no detalhe.</p>
          </div>
        `;
        return;
      }

      el.innerHTML = withDocs.map(v => `
        <div class="db" data-id="${v.id}">
          <div class="db-h">
            <div style="display:flex;align-items:center;gap:9px">
              ${carIcon(15)}
              <strong>${esc(v.apelido || v.placa || 'Sem nome')}</strong>
            </div>
            <span class="bdg">${(v.documentos || []).length} doc${(v.documentos || []).length !== 1 ? 's' : ''}</span>
          </div>
          ${(v.documentos || []).map((d, index) => `
            <div class="dr">
              <div class="dr-ico">${docIcon(15)}</div>
              <div class="dr-inf">
                <strong>${esc(d.nome)}</strong>
                <small>${esc(d.tipo)}${d.size ? ' — ' + fmtBytes(d.size) : ''}</small>
              </div>
              <div style="display:flex; gap: 5px; align-items:center;">
                <a class="bgh" href="${d.url}" download="${esc(d.nome)}" target="_blank" style="font-size:12px;padding:6px 10px">Abrir</a>
                <button class="bdn" data-action="del-doc" data-vid="${v.id}" data-idx="${index}" style="padding:6px 10px; font-size:12px; border-radius:10px;">Excluir</button>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function openModal(id=null){
      editId = id;
      const v = id ? db.find(x => x.id === id) : null;
      $('#modalTitle').textContent = id ? 'Editar Veículo' : 'Novo Veículo';

      $('#veiculoId').value = v?.id || '';
      $('#fApelido').value = v?.apelido || '';
      $('#fPlaca').value = v?.placa || '';
      $('#fTipo').value = v?.tipo || '';
      $('#fStatus').value = v?.status || 'Regular';
      $('#fMarca').value = v?.marca || '';
      $('#fModelo').value = v?.modelo || '';
      $('#fAno').value = v?.ano || '';
      $('#fCor').value = v?.cor || '';
      $('#fRenavam').value = v?.renavam || '';
      $('#fChassi').value = v?.chassi || '';
      $('#fProprietario').value = v?.proprietario || '';
      $('#fObs').value = v?.obs || '';
      $('#fIpva').value = v?.ipva || '';
      $('#fLicenciamento').value = v?.licenciamento || '';
      $('#fSeguro').value = v?.seguro || '';
      $('#fCnh').value = v?.cnh || '';
      $('#fRevisao').value = v?.revisao || '';
      $('#fVistoria').value = v?.vistoria || '';

      $('#modalVeiculo').classList.add('on');
      setTimeout(() => $('#fApelido').focus(), 50);
    }

    function closeModal(){
      $('#modalVeiculo').classList.remove('on');
      editId = null;
    }

    function saveVehicle(){
      const data = {
        id: $('#veiculoId').value || uid(),
        apelido: $('#fApelido').value.trim(),
        placa: $('#fPlaca').value.trim(),
        tipo: $('#fTipo').value.trim(),
        status: $('#fStatus').value.trim() || 'Regular',
        marca: $('#fMarca').value.trim(),
        modelo: $('#fModelo').value.trim(),
        ano: $('#fAno').value.trim(),
        cor: $('#fCor').value.trim(),
        renavam: $('#fRenavam').value.trim(),
        chassi: $('#fChassi').value.trim(),
        proprietario: $('#fProprietario').value.trim(),
        obs: $('#fObs').value.trim(),
        ipva: $('#fIpva').value,
        licenciamento: $('#fLicenciamento').value,
        seguro: $('#fSeguro').value,
        cnh: $('#fCnh').value,
        revisao: $('#fRevisao').value,
        vistoria: $('#fVistoria').value
      };

      if (!data.apelido || !data.placa || !data.tipo){
        toast('Preencha Apelido, Placa e Tipo', 'warn');
        return;
      }

      const idx = db.findIndex(x => x.id === data.id);
      if (idx >= 0){
        db[idx] = { ...db[idx], ...data, atualizadoEm: new Date().toISOString(), documentos: db[idx].documentos || [] };
      } else {
        db.unshift({ ...data, criadoEm: new Date().toISOString(), atualizadoEm: new Date().toISOString(), documentos: [] });
      }

      saveDB();
      closeModal();
      renderView(view);
      toast('Veículo salvo com sucesso', 'ok');
    }

    function deleteVehicle(id){
      const v = db.find(x => x.id === id);
      if (!v) return;
      if (!confirm(`Excluir "${v.apelido || v.placa || 'veículo'}"?`)) return;
      db = db.filter(x => x.id !== id);
      saveDB();
      if (detailId === id) closeDetail();
      renderView(view);
      toast('Veículo excluído', 'ok');
    }

    function closeDetail() {
      $('#modalDetalhe').classList.remove('on');
      detailId = null;
    }

    function openDetail(id){
      const v = db.find(x => x.id === id);
      if (!v) return;
      detailId = id;

      const info = [
        ['Apelido', v.apelido],
        ['Placa', v.placa],
        ['Tipo', v.tipo],
        ['Status', v.status],
        ['Marca', v.marca],
        ['Modelo', v.modelo],
        ['Ano', v.ano],
        ['Cor', v.cor],
        ['RENAVAM', v.renavam],
        ['Chassi', v.chassi],
        ['Proprietário', v.proprietario],
        ['Criado em', fmtDate(v.criadoEm?.slice(0,10))]
      ];

      const datas = [
        ['IPVA', v.ipva],
        ['Licenciamento', v.licenciamento],
        ['Seguro', v.seguro],
        ['CNH', v.cnh],
        ['Revisão', v.revisao],
        ['Vistoria', v.vistoria]
      ];

      $('#detTitle').textContent = v.apelido || 'Detalhe';
      $('#detBody').innerHTML = `
        <div class="det-g">
          <div class="det-c">
            <h3>Informações</h3>
            <div class="det-i">
              ${info.map(([k,val]) => `
                <div>
                  <label>${esc(k)}</label>
                  <span>${esc(val || '—')}</span>
                </div>
              `).join('')}
            </div>

            <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
              <button class="bac" id="detEdit" data-id="${v.id}">Editar</button>
              <button class="bdn" id="detDelete" data-id="${v.id}">Excluir</button>
            </div>
          </div>

          <div class="det-c">
            <h3>Datas</h3>
            <div class="det-i">
              ${datas.map(([k,val]) => `
                <div>
                  <label>${esc(k)}</label>
                  <span>${esc(fmtDate(val))}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="det-c" style="grid-column:1/-1">
            <h3>Adicionar documento / Fotos</h3>
            <div class="doc-add">
              <div class="fg">
                <label>Arquivo</label>
                <input type="file" id="docFile" accept=".pdf,.jpg,.jpeg,.png,.webp">
              </div>
              <div class="fg">
                <label>Nome do Doc</label>
                <input id="docNome" placeholder="Ex: CRLV 2026">
              </div>
              <div class="fg">
                <label>Tipo</label>
                <select id="docTipo">
                  <option>Outro</option>
                  <option>CRLV</option>
                  <option>PDF</option>
                  <option>Foto</option>
                  <option>Comprovante</option>
                </select>
              </div>
              <button class="bac" id="btnUploadDoc">Salvar Doc</button>
            </div>

            <div id="detDocsList" style="margin-top: 15px;">
              ${(v.documentos || []).map((d, idx) => `
                <div class="doc-item">
                  ${docIcon(14)}
                  <div>
                    <strong>${esc(d.nome)}</strong> 
                    <small style="color:var(--sub)">(${esc(d.tipo)}${d.size ? ' — ' + fmtBytes(d.size) : ''})</small>
                  </div>
                  <div class="x" style="display:flex; gap:5px;">
                    <a class="bgh" href="${d.url}" download="${esc(d.nome)}" target="_blank" style="font-size:11px; padding:4px 8px; border-radius:6px;">Abrir</a>
                    <button class="bdn" data-action="del-doc" data-vid="${v.id}" data-idx="${idx}" style="font-size:11px; padding:4px 8px; border-radius:6px;">✕</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;

      $('#modalDetalhe').classList.add('on');
    }

    function handleDocUpload() {
      const fileInput = $('#docFile');
      const nomeInput = $('#docNome');
      const tipoSelect = $('#docTipo');

      if (!fileInput || !fileInput.files.length) {
        toast('Selecione um arquivo', 'warn');
        return;
      }

      const file = fileInput.files[0];
      const nome = nomeInput.value.trim() || file.name;
      const tipo = tipoSelect.value;

      const reader = new FileReader();
      reader.onload = function(e) {
        const docData = {
          nome,
          tipo,
          size: file.size,
          url: e.target.result
        };

        const v = db.find(x => x.id === detailId);
        if (v) {
          if (!v.documentos) v.documentos = [];
          v.documentos.push(docData);
          saveDB();
          toast('Documento adicionado', 'ok');
          openDetail(detailId);
        }
      };
      reader.readAsDataURL(file);
    }

    function handleDocDelete(vId, idx) {
      const v = db.find(x => x.id === vId);
      if (v && v.documentos) {
        v.documentos.splice(idx, 1);
        saveDB();
        toast('Documento removido', 'ok');
        if (detailId === vId) {
          openDetail(vId);
        } else {
          renderDocumentos();
        }
      }
    }

    // --- PARSER XML CORRIGIDO PARA O PADRÃO REAL DA BOOM SISTEMAS ---
    function parseBoomXml(xmlString) {
      try {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlString, "text/xml");
        
        let veiculosTags = xmlDoc.getElementsByTagName("veiculo");
        if (!veiculosTags.length) veiculosTags = xmlDoc.getElementsByTagName("item");
        if (!veiculosTags.length) veiculosTags = xmlDoc.getElementsByTagName("vehicle");

        if (!veiculosTags.length) {
          toast('Nenhum veículo estruturado no XML', 'warn');
          return;
        }

        const novosVeiculos = [];

        for (let i = 0; i < veiculosTags.length; i++) {
          const vNode = veiculosTags[i];

          const read = tag => {
            const el = vNode.getElementsByTagName(tag)[0];
            return el && el.textContent ? el.textContent.trim() : '';
          };

          // CORREÇÃO DAS FOTOS: A Boom Sistemas usa a tag estrutural <midias> contendo múltiplos blocos <foto>
          const fotosArray = [];
          const midiasContainer = vNode.getElementsByTagName("midias")[0];
          if (midiasContainer) {
            const fotosLinks = midiasContainer.getElementsByTagName("foto");
            for (let j = 0; j < fotosLinks.length; j++) {
              if (fotosLinks[j] && fotosLinks[j].textContent) {
                fotosArray.push({
                  nome: `Foto ${j + 1}`,
                  tipo: 'Foto',
                  url: fotosLinks[j].textContent.trim()
                });
              }
            }
          } else {
            // Fallback caso venha solto no nó principal
            const fotosLinksSoltas = vNode.getElementsByTagName("foto");
            for (let j = 0; j < fotosLinksSoltas.length; j++) {
              if (fotosLinksSoltas[j] && fotosLinksSoltas[j].textContent) {
                fotosArray.push({
                  nome: `Foto ${j + 1}`,
                  tipo: 'Foto',
                  url: fotosLinksSoltas[j].textContent.trim()
                });
              }
            }
          }

          const marca = read('marca') || read('brand');
          const modelo = read('modelo') || read('model');
          
          // CORREÇÃO DO NOME/APELIDO: Monta dinamicamente caso a tag versão venha vazia
          const versao = read('versao') || read('version') || read('combustivel') || (read('portas') ? read('portas') + 'P' : '');
          const nomeCarro = versao ? `${modelo} ${versao}` : modelo || 'Veículo Sem Nome';

          novosVeiculos.push({
            id: uid(),
            criadoEm: new Date().toISOString(),
            atualizadoEm: new Date().toISOString(),
            documentos: fotosArray,
            apelido: nomeCarro,
            placa: read('placa') || read('plate'),
            tipo: read('tipo') || read('type') || 'Carro',
            status: 'Regular',
            marca: marca,
            modelo: modelo,
            ano: read('ano_fabricacao') || read('ano_modelo') || read('year'),
            cor: read('cor') || read('color'),
            renavam: read('renavam'),
            chassi: read('chassi') || read('vin'),
            proprietario: 'Estoque Central',
            obs: read('observacao') || read('opcionais') || read('descricao'),
            ipva:'', licenciamento:'', seguro:'', cnh:'', revisao:'', vistoria:''
          });
        }

        const placasExistentes = db.map(x => norm(x.placa)).filter(Boolean);
        const filtrados = novosVeiculos.filter(x => !placasExistentes.includes(norm(x.placa)));

        if (filtrados.length === 0) {
          toast('Todos os carros deste XML já constam no painel', 'warn');
          return;
        }

        db = [...filtrados, ...db];
        saveDB();
        renderView(view);
        toast(`${filtrados.length} carros adicionados com fotos e nomes!`, 'ok');
      } catch (err) {
        console.error(err);
        toast('Erro de leitura nas tags do arquivo XML', 'err');
      }
    }

    // EVENTOS DO SISTEMA
    $('#btnToggle').addEventListener('click', () => {
      $('#sidebar').classList.toggle('collapsed');
      $('#btnToggle').textContent = $('#sidebar').classList.contains('collapsed') ? '›' : '‹';
    });

    $$('.sb-nav .nb').forEach(btn => {
      btn.addEventListener('click', () => renderView(btn.dataset.view));
    });

    $('#btnNovoVeiculo').addEventListener('click', () => openModal());
    $('#btnSalvar').addEventListener('click', saveVehicle);

    $$('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => {
        $(`#${btn.dataset.close}`).classList.remove('on');
      });
    });

    document.addEventListener('click', e => {
      const vcCard = e.target.closest('.vc, .ai, .vr, .db-h');
      const actionBtn = e.target.closest('button, a');
      
      if (vcCard && !actionBtn) {
        const id = vcCard.dataset.id;
        if (id) openDetail(id);
      }

      if (actionBtn) {
        const act = actionBtn.dataset.action;
        const id = actionBtn.dataset.id;
        
        if (act === 'edit') {
          e.stopPropagation();
          openModal(id);
        } else if (act === 'del') {
          e.stopPropagation();
          deleteVehicle(id);
        } else if (act === 'del-doc') {
          e.stopPropagation();
          handleDocDelete(actionBtn.dataset.vid, parseInt(actionBtn.dataset.idx));
        }
      }

      if (e.target.id === 'detEdit') {
        const id = e.target.dataset.id;
        closeDetail();
        openModal(id);
      }
      if (e.target.id === 'detDelete') {
        deleteVehicle(e.target.dataset.id);
      }
      if (e.target.id === 'btnUploadDoc') {
        handleDocUpload();
      }
    });

    // Filtros e Busca
    $('#searchInput').addEventListener('input', e => {
      search = norm(e.target.value);
      if (view === 'veiculos') renderVeiculos();
    });
    $('#filtroTipo').addEventListener('change', renderVeiculos);
    $('#filtroStatus').addEventListener('change', renderVeiculos);

    // Modos de Visualização
    $('#btnGrade').addEventListener('click', () => {
      listMode = false;
      $('#btnGrade').classList.add('on');
      $('#btnLista').classList.remove('on');
      renderVeiculos();
    });
    $('#btnLista').addEventListener('click', () => {
      listMode = true;
      $('#btnLista').classList.add('on');
      $('#btnGrade').classList.remove('on');
      renderVeiculos();
    });

    // Exportar Banco de Dados Completo (.JSON)
    $('#btnExportar').addEventListener('click', () => {
      if (!db.length) { toast('Nenhum dado para backup', 'warn'); return; }
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `mer_crm_backup_${new Date().toISOString().slice(0,10)}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
      toast('Backup JSON gerado', 'ok');
    });

    // Exportar Estoque Atual como arquivo XML (No formato Boom Sistemas)
    $('#btnExportarXml').addEventListener('click', () => {
      if (!db.length) { toast('Estoque vazio para conversão', 'warn'); return; }
      
      let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<estoque>\n';
      
      db.forEach(v => {
        xml += '  <veiculo>\n';
        xml += `    <placa>${esc(v.placa)}</placa>\n`;
        xml += `    <marca>${esc(v.marca)}</marca>\n`;
        xml += `    <modelo>${esc(v.modelo)}</modelo>\n`;
        xml += `    <versao>${esc(v.apelido)}</versao>\n`;
        xml += `    <tipo>${esc(v.tipo)}</tipo>\n`;
        xml += `    <ano_fabricacao>${esc(v.ano)}</ano_fabricacao>\n`;
        xml += `    <ano_modelo>${esc(v.ano)}</ano_modelo>\n`;
        xml += `    <cor>${esc(v.cor)}</cor>\n`;
        xml += `    <chassi>${esc(v.chassi)}</chassi>\n`;
        xml += `    <renavam>${esc(v.renavam)}</renavam>\n`;
        xml += `    <observacao>${esc(v.obs)}</observacao>\n`;
        
        const fotos = (v.documentos || []).filter(d => d.tipo === 'Foto' || d.url.startsWith('http'));
        if (fotos.length) {
          xml += '    <midias>\n';
          fotos.forEach(f => {
            xml += `      <foto>${esc(f.url)}</foto>\n`;
          });
          xml += '    </midias>\n';
        }
        
        xml += '  </veiculo>\n';
      });
      
      xml += '</estoque>';

      const blob = new Blob([xml], { type: 'text/xml' });
      const downloadAnchor = document.createElement('a');
      downloadAnchor.href = URL.createObjectURL(blob);
      downloadAnchor.setAttribute("download", `mer_seminovos_estoque_${new Date().toISOString().slice(0,10)}.xml`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
      toast('Arquivo XML gerado!', 'ok');
    });

    // Importador Universal Unificado (Lê planilhas Excel, arquivos .xml ou backups .json)
    $('#btnImportar').addEventListener('click', () => $('#inputImportar').click());
    $('#inputImportar').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      
      const ext = file.name.split('.').pop().toLowerCase();
      const reader = new FileReader();

      if (ext === 'xlsx' || ext === 'xls') {
        reader.onload = function(evt) {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet);

            if (!rows.length) { toast('A planilha selecionada está vazia', 'warn'); return; }

            const pick = (row, aliases) => {
              const keys = Object.keys(row);
              for (const a of aliases) {
                const f = keys.find(k => norm(k) === norm(a));
                if (f !== undefined) return String(row[f] ?? '').trim();
              }
              return '';
            };

            const importedVehicles = rows.map(row => ({
              id: uid(), criadoEm: new Date().toISOString(), atualizadoEm: new Date().toISOString(), documentos: [],
              apelido: pick(row, ['Apelido', 'Nome', 'Apelido / Nome']),
              placa: pick(row, ['Placa']), tipo: pick(row, ['Tipo']) || 'Carro', status: pick(row, ['Status']) || 'Regular',
              marca: pick(row, ['Marca']), modelo: pick(row, ['Modelo']), ano: pick(row, ['Ano']), cor: pick(row, ['Cor']),
              renavam: pick(row, ['RENAVAM', 'Renavam']), chassi: pick(row, ['Chassi']), proprietario: pick(row, ['Proprietario', 'Dono']),
              obs: pick(row, ['Observacoes', 'Obs']), ipva:'', licenciamento:'', seguro:'', cnh:'', revisao:'', vistoria:''
            }));

            db = [...importedVehicles, ...db];
            saveDB(); renderView(view);
            toast(`${importedVehicles.length} veículos carregados do Excel!`, 'ok');
          } catch { toast('Falha ao interpretar arquivo do Excel', 'err'); }
        };
        reader.readAsArrayBuffer(file);

      } else if (ext === 'xml') {
        reader.onload = function(evt) {
          parseBoomXml(evt.target.result);
        };
        reader.readAsText(file);

      } else {
        reader.onload = function(evt) {
          try {
            const imported = JSON.parse(evt.target.result);
            if (Array.isArray(imported)) {
              db = imported; saveDB(); renderView(view);
              toast('Backup JSON restaurado', 'ok');
            } else { toast('Arquivo de backup inválido', 'err'); }
          } catch { toast('Erro ao descriptografar arquivo JSON', 'err'); }
        };
        reader.readAsText(file);
      }
      e.target.value = '';
    });

    db = loadDB();
    renderView('dashboard');

  })();
  </script>
</body>
