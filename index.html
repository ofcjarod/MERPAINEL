<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MeR Seminovos | Enterprise CRM</title>
    <style>
        :root { --bg:#050505; --card:#111; --ac:#ffb300; --txt:#eee; --err:#ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); display: flex; height: 100vh; }
        aside { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        main { flex: 1; padding: 30px; overflow: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        button { padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; }
        button:hover { background: var(--ac); color: #000; }
        .btn-l { color: var(--ac); font-size: 12px; }
        #log-area { font-family: monospace; background: #000; color: #0f0; padding: 15px; font-size: 12px; height: 200px; overflow: auto; }
    </style>
</head>
<body>

<aside>
    <img src="LOGOTIPO.png" style="width:100%" onerror="this.style.display='none'">
    <button onclick="view('estoque')">Estoque</button>
    <button onclick="view('kanban')">Kanban</button>
    <button onclick="view('sistema')">Relatórios e Erros</button>
    <hr>
    <button onclick="importar()">Importar XML/JSON</button>
    <button onclick="exportar()">Exportar Dados (Backup)</button>
</aside>

<main>
    <div id="estoque" class="view"><h1>Estoque</h1><div id="lista"></div></div>
    <div id="kanban" class="view" style="display:none"><h1>Kanban</h1><div id="board"></div></div>
    <div id="sistema" class="view" style="display:none">
        <h1>Relatórios de Sistema</h1>
        <div id="log-area"></div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('mer_db') || '[]');
    let logs = [];

    function log(msg) { logs.push(`[${new Date().toLocaleTimeString()}] ${msg}`); document.getElementById('log-area').innerHTML = logs.join('<br>'); }
    
    function view(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'estoque') renderEstoque();
    }

    function renderEstoque() {
        const list = document.getElementById('lista');
        list.innerHTML = db.map(v => `
            <div class="card">
                <strong>${v.modelo}</strong> (${v.placa}) <br>
                <button class="btn-l" onclick="copyResumo('${v.id}')">Copiar Resumo</button>
            </div>
        `).join('');
    }

    function copyResumo(id) {
        const v = db.find(x => x.id == id);
        const texto = `Resumo Veículo: ${v.modelo}\nPlaca: ${v.placa}\nPendências: ${v.pendencias || 'Nenhuma'}`;
        navigator.clipboard.writeText(texto);
        log('Resumo do veículo ' + v.placa + ' copiado.');
    }

    // Importação unificada com Log de erro
    document.getElementById('inputImportar')?.addEventListener('change', (e) => {
        try {
            log('Iniciando importação...');
            // Lógica de processamento...
            log('Importação concluída com sucesso.');
        } catch(e) {
            log('ERRO: ' + e.message);
        }
    });

    log('Sistema iniciado.');
</script>
</body>
</html>
