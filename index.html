<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeR Seminovos - CRM Pos-Venda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
        <div class="logo-text">
          <span class="logo-name">MeR</span>
          <span class="logo-sub">CRM Pos-Venda</span>
        </div>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">&#8249;</button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="kanban">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="5" height="18" rx="1"/>
          <rect x="10" y="3" width="5" height="12" rx="1"/>
          <rect x="17" y="3" width="4" height="15" rx="1"/>
        </svg>
        <span>Kanban</span>
      </button>
      <button class="nav-btn" data-view="lista">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span>Lista</span>
      </button>
      <button class="nav-btn" data-view="dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-btn" data-view="tarefas">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>Tarefas</span>
      </button>
    </nav>

    <!-- EXPORT / IMPORT -->
    <div class="sidebar-actions">
      <div class="sidebar-actions-label">Dados</div>
      <button class="action-btn" id="btnExport">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Exportar JSON</span>
      </button>
      <label class="action-btn" id="btnImportLabel">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Importar JSON</span>
        <input type="file" id="inputImport" accept=".json" style="display:none"/>
      </label>
    </div>

    <div class="sidebar-footer">
      <span class="logo-name" style="font-size:13px">MeR Seminovos</span>
      <small>CRM Pos-Venda</small>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">Kanban</h1>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Buscar cliente, veiculo, placa..."/>
        </div>
        <select id="filtroEtapa" class="topbar-select">
          <option value="">Todas etapas</option>
          <option value="documentacao">Documentacao</option>
          <option value="financiamento">Financiamento</option>
          <option value="transferencia">Transferencia</option>
          <option value="entrega">Entrega</option>
          <option value="concluido">Concluido</option>
          <option value="problema">Problema</option>
        </select>
        <button class="btn btn-primary" id="btnNovaVenda">+ Nova Venda</button>
      </div>
    </header>

    <!-- VIEW: KANBAN -->
    <section class="view active" id="view-kanban">
      <div class="kanban-board" id="kanbanBoard"></div>
    </section>

    <!-- VIEW: LISTA -->
    <section class="view" id="view-lista">
      <div class="lista-wrap" id="listaWrap"></div>
    </section>

    <!-- VIEW: DASHBOARD -->
    <section class="view" id="view-dashboard">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="dash-bottom">
        <div class="card" id="cardRecentes">
          <div class="card-header"><h2>Vendas Recentes</h2></div>
          <div id="vendasRecentes"></div>
        </div>
        <div class="card" id="cardTarefasDash">
          <div class="card-header"><h2>Tarefas Pendentes</h2></div>
          <div id="tarefasDash"></div>
        </div>
      </div>
    </section>

    <!-- VIEW: TAREFAS -->
    <section class="view" id="view-tarefas">
      <div class="tarefas-all" id="tarefasAll"></div>
    </section>

  </main>

  <!-- MODAL: NOVA / EDITAR VENDA -->
  <div class="modal-overlay" id="modalVenda">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalVendaTitle">Nova Venda</h2>
        <button class="close-btn" id="closeModalVenda">&#10005;</button>
      </div>
      <div class="modal-body">
        <form id="formVenda">
          <input type="hidden" id="fVendaId"/>

          <div class="form-section">
            <h3>Veiculo</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>Veiculo *</label>
                <input type="text" id="fVeiculo" required placeholder="Ex: Gol 2020 Prata"/>
              </div>
              <div class="form-group">
                <label>Placa *</label>
                <input type="text" id="fPlaca" required placeholder="ABC-1234"/>
              </div>
              <div class="form-group">
                <label>Marca</label>
                <input type="text" id="fMarca" placeholder="Volkswagen"/>
              </div>
              <div class="form-group">
                <label>Ano</label>
                <input type="number" id="fAno" placeholder="2020"/>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label>Valor de Venda (R$) *</label>
                <input type="text" id="fValor" required placeholder="45.000,00"/>
              </div>
              <div class="form-group">
                <label>Forma de Pagamento</label>
                <select id="fPagamento">
                  <option>A Vista</option>
                  <option>Financiamento</option>
                  <option>Consorcio</option>
                  <option>Troca + Complemento</option>
                  <option>Misto</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>Cliente</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>Nome *</label>
                <input type="text" id="fCliente" required placeholder="Nome completo"/>
              </div>
              <div class="form-group">
                <label>CPF / CNPJ</label>
                <input type="text" id="fCpf" placeholder="000.000.000-00"/>
              </div>
              <div class="form-group">
                <label>Telefone</label>
                <input type="text" id="fTelefone" placeholder="(11) 99999-9999"/>
              </div>
              <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="fEmail" placeholder="cliente@email.com"/>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>Processo</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>Etapa Atual</label>
                <select id="fEtapa">
                  <option value="documentacao">Documentacao</option>
                  <option value="financiamento">Financiamento</option>
                  <option value="transferencia">Transferencia</option>
                  <option value="entrega">Entrega</option>
                  <option value="concluido">Concluido</option>
                  <option value="problema">Problema</option>
                </select>
              </div>
              <div class="form-group">
                <label>Vendedor</label>
                <input type="text" id="fVendedor" placeholder="Nome do vendedor"/>
              </div>
              <div class="form-group">
                <label>Data da Venda</label>
                <input type="date" id="fDataVenda"/>
              </div>
              <div class="form-group">
                <label>Previsao de Entrega</label>
                <input type="date" id="fPrevisaoEntrega"/>
              </div>
            </div>
            <div class="form-group">
              <label>Banco / Financeira</label>
              <input type="text" id="fBanco" placeholder="Ex: Banco do Brasil, Santander..."/>
            </div>
            <div class="form-group">
              <label>Observacoes</label>
              <textarea id="fObs" rows="3" placeholder="Anotacoes gerais sobre a venda..."></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="cancelModalVenda">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- MODAL: DETALHE VENDA -->
  <div class="modal-overlay" id="modalDetalhe">
    <div class="modal modal-xl">
      <div class="modal-header">
        <div>
          <h2 id="detalheVeiculo">Detalhe</h2>
          <div id="detalheSubtitle" style="font-size:13px;color:var(--text-muted);margin-top:3px"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost btn-sm" id="btnEditarDetalhe">Editar</button>
          <button class="close-btn" id="closeDetalhe">&#10005;</button>
        </div>
      </div>
      <div class="modal-body" id="detalheBody"></div>
    </div>
  </div>

  <!-- MODAL: MUDAR ETAPA -->
